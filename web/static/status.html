<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover empareja con el resto de las páginas de la PWA
       para que en standalone no haya gaps en notch / Dynamic Island. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a1f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="rag">
  <title>rag · status</title>

  <!-- PWA wiring — mismo set que home/chat/dashboard para que esta página
       también entre al cache del service worker. -->
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/pwa/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/pwa/favicon-16.png">
  <link rel="apple-touch-icon" href="/static/pwa/apple-touch-icon.png">

  <script>
    // Inline theme init — corre antes del paint para evitar flash de
    // tema. Espeja el snippet de home/chat/dashboard.
    (function () {
      try {
        var t = localStorage.getItem("rag-theme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
      } catch (e) {}
    })();
  </script>
  <script src="/static/pwa/register-sw.js" defer></script>
  <style>
    /* Paleta heredada del dashboard — mismas CSS vars, mismo aesthetic.
       Mantener sincronizado si se toca dashboard.html. */
    :root {
      --bg: #1a1a1f;
      --bg-elev: #222228;
      --bg-card: #26262c;
      --border: #33333a;
      --border-strong: #3e3e46;
      --text: #ececed;
      --text-dim: #a0a0a6;
      --text-faint: #7a7a82;
      --green: #7ee787;
      --cyan: #79c0ff;
      --cyan-dim: #5a9bd5;
      --yellow: #e3c27a;
      --red: #ff7b72;
      --purple: #d2a8ff;
      --grid: rgba(255,255,255,0.04);
      --hover: rgba(255,255,255,0.06);
      --sep: rgba(255,255,255,0.03);
      color-scheme: dark;
    }

    :root[data-theme="light"] {
      --bg: #fafafa;
      --bg-elev: #ffffff;
      --bg-card: #ffffff;
      --border: #e2e2e5;
      --border-strong: #cfcfd4;
      --text: #1a1a20;
      --text-dim: #52525b;
      --text-faint: #70707a;
      --green: #2f8f3d;
      --cyan: #0969da;
      --cyan-dim: #0969da;
      --yellow: #a0761a;
      --red: #c8311f;
      --purple: #7c3aed;
      --grid: rgba(0,0,0,0.05);
      --hover: rgba(0,0,0,0.04);
      --sep: rgba(0,0,0,0.04);
      color-scheme: light;
    }

    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg: #fafafa;
        --bg-elev: #ffffff;
        --bg-card: #ffffff;
        --border: #e2e2e5;
        --border-strong: #cfcfd4;
        --text: #1a1a20;
        --text-dim: #52525b;
        --text-faint: #70707a;
        --green: #2f8f3d;
        --cyan: #0969da;
        --cyan-dim: #0969da;
        --yellow: #a0761a;
        --red: #c8311f;
        --purple: #7c3aed;
        --grid: rgba(0,0,0,0.05);
        --hover: rgba(0,0,0,0.04);
        --sep: rgba(0,0,0,0.04);
        color-scheme: light;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: "SF Mono", "Menlo", "Monaco", "JetBrains Mono", ui-monospace, monospace;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    :focus { outline: none; }
    :focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: 2px;
      border-radius: 4px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* Header idéntico al dashboard (sticky, blur, meta a la derecha). */
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 14px 0 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      gap: 12px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--cyan);
    }

    header h1 span { color: var(--text-faint); font-weight: 400; }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 12px;
      color: var(--text-dim);
      flex-wrap: wrap;
    }

    .header-meta a {
      color: var(--cyan-dim);
      text-decoration: none;
    }
    .header-meta a:hover { color: var(--cyan); }

    .header-meta button {
      background: var(--bg-elev);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .header-meta button:hover {
      background: var(--hover);
      border-color: var(--border-strong);
    }
    .header-meta button[aria-pressed="true"] {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    /* Overall hero — banda grande arriba con el veredicto global. */
    .overall {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 18px;
      align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left-width: 4px;
      border-radius: 10px;
      padding: 22px 24px;
      margin-bottom: 18px;
    }
    .overall.ok      { border-left-color: var(--green); }
    .overall.degraded { border-left-color: var(--yellow); }
    .overall.down    { border-left-color: var(--red); }

    .overall-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text-faint);
      box-shadow: 0 0 0 0 rgba(0,0,0,0);
    }
    .overall.ok .overall-dot    { background: var(--green); box-shadow: 0 0 14px color-mix(in srgb, var(--green) 60%, transparent); }
    .overall.degraded .overall-dot { background: var(--yellow); box-shadow: 0 0 14px color-mix(in srgb, var(--yellow) 60%, transparent); }
    .overall.down .overall-dot   { background: var(--red); box-shadow: 0 0 14px color-mix(in srgb, var(--red) 60%, transparent); }

    .overall-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .overall-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }
    .overall.ok .overall-title { color: var(--green); }
    .overall.degraded .overall-title { color: var(--yellow); }
    .overall.down .overall-title { color: var(--red); }

    .overall-sub {
      font-size: 12px;
      color: var(--text-dim);
    }

    .overall-counts {
      display: flex;
      gap: 14px;
      font-variant-numeric: tabular-nums;
    }
    .overall-count {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
    }
    .overall-count .n {
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
    }
    .overall-count .lbl {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-faint);
    }
    .overall-count.ok .n   { color: var(--green); }
    .overall-count.warn .n { color: var(--yellow); }
    .overall-count.down .n { color: var(--red); }

    /* Categorías: cada una es una card con un header + grid de servicios. */
    .category {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px 18px;
      margin-bottom: 14px;
    }
    .category-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--sep);
    }
    .category-head h2 {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .category-head .cat-counts {
      font-size: 11px;
      color: var(--text-faint);
      font-variant-numeric: tabular-nums;
    }
    .category-head .cat-counts .n-ok   { color: var(--green); }
    .category-head .cat-counts .n-warn { color: var(--yellow); }
    .category-head .cat-counts .n-down { color: var(--red); }

    .services {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 8px 16px;
    }

    .service {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--sep);
      border-radius: 8px;
      border-left: 3px solid var(--border-strong);
      min-height: 46px;
      transition: background 0.12s;
    }
    .service:hover { background: var(--hover); }
    .service.ok    { border-left-color: var(--green); }
    .service.warn  { border-left-color: var(--yellow); }
    .service.down  { border-left-color: var(--red); }

    .service-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-faint);
      flex-shrink: 0;
    }
    .service.ok .service-dot   { background: var(--green); }
    .service.warn .service-dot { background: var(--yellow); }
    .service.down .service-dot { background: var(--red); animation: pulse 1.6s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.65; transform: scale(1.15); }
    }
    @media (prefers-reduced-motion: reduce) {
      .service.down .service-dot { animation: none; }
    }

    .service-main {
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-width: 0;
    }
    .service-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .service-detail {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-variant-numeric: tabular-nums;
    }
    .service-detail a {
      color: var(--cyan-dim);
      text-decoration: none;
    }
    .service-detail a:hover {
      color: var(--cyan);
      text-decoration: underline;
    }

    .service-kind {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--bg-elev);
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      flex-shrink: 0;
    }
    .service-kind.kind-daemon    { color: var(--cyan); }
    .service-kind.kind-scheduled { color: var(--purple); }
    .service-kind.kind-probe     { color: var(--text-faint); }

    .service-action {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 9px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }
    .service-action:hover {
      background: var(--hover);
      border-color: var(--border-strong);
      color: var(--text);
    }
    .service-action:disabled {
      opacity: 0.55;
      cursor: progress;
    }
    .service-action.start {
      color: var(--green);
      border-color: color-mix(in srgb, var(--green) 35%, var(--border));
    }
    .service-action.start:hover {
      color: var(--green);
      background: color-mix(in srgb, var(--green) 10%, transparent);
      border-color: color-mix(in srgb, var(--green) 60%, var(--border));
    }
    .service-action.stop {
      color: var(--red);
      border-color: color-mix(in srgb, var(--red) 35%, var(--border));
    }
    .service-action.stop:hover {
      color: var(--red);
      background: color-mix(in srgb, var(--red) 10%, transparent);
      border-color: color-mix(in srgb, var(--red) 60%, var(--border));
    }
    .service-action .action-icon {
      font-size: 9px;
      line-height: 1;
    }

    .info-banner {
      background: color-mix(in srgb, var(--green) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--green) 38%, transparent);
      color: var(--green);
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 14px;
      font-size: 12px;
    }

    /* Loading / error states. */
    .loading {
      text-align: center;
      padding: 80px 0;
      color: var(--text-dim);
    }
    .loading::after { content: "▍"; }
    @media (prefers-reduced-motion: no-preference) {
      .loading::after { animation: blink 1s steps(2) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
    }
    .error-banner {
      background: color-mix(in srgb, var(--red) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--red) 40%, transparent);
      color: var(--red);
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 14px;
      font-size: 12px;
    }

    /* Mobile tweaks — densidad menor, 1 columna. */
    @media (max-width: 640px) {
      .container { padding: 16px 14px 40px; }
      header { margin-bottom: 16px; padding: 10px 0 12px; }
      header h1 { font-size: 16px; }
      .overall { grid-template-columns: auto 1fr; padding: 14px 16px; }
      .overall-counts { grid-column: 1 / -1; justify-content: space-around; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--sep); }
      .services { grid-template-columns: 1fr; }
      .service-kind { display: none; }
      .service { grid-template-columns: auto 1fr auto; }
      .service-action .action-label { display: none; }
      .service-action { padding: 4px 7px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>rag <span>· status</span></h1>
      <div class="header-meta">
        <span id="meta-updated" aria-live="polite">cargando…</span>
        <button id="live-toggle" type="button" aria-pressed="true"
                aria-label="Pausar o reanudar auto-refresh">
          <span id="live-label">auto-refresh ON</span>
        </button>
        <button id="refresh-now" type="button" aria-label="Refrescar ahora">↻ refrescar</button>
        <button id="theme-toggle" type="button" aria-label="Alternar tema claro/oscuro">
          <span id="theme-icon" aria-hidden="true">◐</span>
        </button>
        <a href="/">home</a>
        <a href="/chat">chat</a>
        <a href="/dashboard">dashboard</a>
      </div>
    </header>

    <div id="content">
      <div class="loading">Consultando servicios</div>
    </div>
  </div>

  <script src="/static/status.js" defer></script>
</body>
</html>
