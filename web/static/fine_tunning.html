<!DOCTYPE html>

  <script>
    (function () {
      try {
        var t = localStorage.getItem("rag-theme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
      } catch (e) {}
    })();
  </script>
  <script src="/static/pwa/register-sw.js" defer></script>

  <style>
    :root {
      --bg: #1a1a1f;
      --bg-elev: #222228;
      --bg-card: #26262c;
      --border: #33333a;
      --border-strong: #3e3e46;
      --text: #ececed;
      --text-dim: #a0a0a6;
      --text-faint: #7a7a82;
      --green: #7ee787;
      --cyan: #79c0ff;
      --cyan-dim: #5a9bd5;
      --yellow: #e3c27a;
      --red: #ff7b72;
      --purple: #d2a8ff;
      --orange: #ffa657;
      --pink: #f778ba;
      --grid: rgba(255,255,255,0.04);
      --hover: rgba(255,255,255,0.06);
      --sep: rgba(255,255,255,0.03);
      color-scheme: dark;
    }

    :root[data-theme="light"] {
      --bg: #fafafa;
      --bg-elev: #ffffff;
      --bg-card: #ffffff;
      --border: #e2e2e5;
      --border-strong: #cfcfd4;
      --text: #1a1a20;
      --text-dim: #52525b;
      --text-faint: #70707a;
      --green: #2f8f3d;
      --cyan: #0969da;
      --cyan-dim: #0969da;
      --yellow: #a0761a;
      --red: #c8311f;
      --purple: #7c3aed;
      --orange: #c25a11;
      --pink: #d02a8a;
      --grid: rgba(0,0,0,0.05);
      --hover: rgba(0,0,0,0.04);
      --sep: rgba(0,0,0,0.04);
      color-scheme: light;
    }

    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg: #fafafa;
        --bg-elev: #ffffff;
        --bg-card: #ffffff;
        --border: #e2e2e5;
        --border-strong: #cfcfd4;
        --text: #1a1a20;
        --text-dim: #52525b;
        --text-faint: #70707a;
        --green: #2f8f3d;
        --cyan: #0969da;
        --cyan-dim: #0969da;
        --yellow: #a0761a;
        --red: #c8311f;
        --purple: #7c3aed;
        --orange: #c25a11;
        --pink: #d02a8a;
        --grid: rgba(0,0,0,0.05);
        --hover: rgba(0,0,0,0.04);
        --sep: rgba(0,0,0,0.04);
        color-scheme: light;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "SF Mono", "Menlo", "Monaco", "JetBrains Mono", ui-monospace, monospace;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    :focus { outline: none; }
    :focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: 2px;
      border-radius: 4px;
    }

    header.hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px 12px;
      padding: 14px 24px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .hdr-l {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      font-size: 18px;
      font-weight: 700;
    }
    .hdr-l .brand { color: var(--cyan); text-decoration: none; }
    .hdr-l .brand:hover { color: var(--cyan); filter: brightness(1.15); }
    .hdr-l .sep { color: var(--text-faint); font-weight: 400; }
    .hdr-l .title { color: var(--text-faint); font-weight: 400; }

    .hdr-r {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text-dim);
      flex-wrap: wrap;
    }

    .hdr-nav { display: inline-flex; gap: 4px; flex-wrap: wrap; }
    .hdr-nav a {
      font-size: 12px;
      color: var(--text-dim);
      text-decoration: none;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .hdr-nav a:hover { color: var(--cyan); background: var(--hover); }

    .btn-icon {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-faint);
      cursor: pointer;
      user-select: none;
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      font-family: inherit;
    }
    .btn-icon:hover { border-color: var(--border-strong); color: var(--text); }

    .skip-link {
      position: absolute;
      top: 0;
      left: 0;
      background: var(--cyan);
      color: var(--bg);
      padding: 8px 14px;
      border-radius: 0 0 8px 0;
      font-weight: 700;
      font-size: 13px;
      text-decoration: none;
      z-index: 9999;
      transform: translateY(-110%);
      transition: transform 120ms ease-out;
    }
    .skip-link:focus, .skip-link:focus-visible {
      transform: translateY(0);
      outline: 2px solid var(--text);
      outline-offset: 2px;
    }

    main { padding: 24px; }

    #ft-queue {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #ft-empty {
      padding: 48px 24px;
      text-align: center;
      color: var(--text-faint);
      font-size: 14px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      background: var(--bg-card);
    }

    @media (max-width: 640px) {
      header.hdr { padding: 12px 16px; }
      .hdr-l { font-size: 16px; }
      main { padding: 16px; }
    }
    @media (pointer: coarse), (max-width: 640px) {
      .btn-icon, .hdr-nav a { min-height: 36px; }
    }

    /* ── fine_tunning panel ── */
    :root {
      --badge-retrieval: #4c8eff;
      --badge-retrieval_answer: #2563eb;
      --badge-brief: #a855f7;
      --badge-anticipate: #fb923c;
      --badge-draft: #10b981;
      --badge-draft_wa: #059669;
      --badge-proactive_push: #f59e0b;
      --badge-whatsapp_msg: #25d366;
      --badge-style: #ec4899;
      --badge-tool_routing: #eab308;
      --badge-read_summary: #06b6d4;
      --card-bg: var(--bg-card);
      --fg: var(--text);
      --muted: var(--text-faint);
      --accent: var(--cyan);
    }

    .ft-subtitle {
      font-size: 12px;
      color: var(--text-faint);
      margin-left: 4px;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
    }

    .ft-loading {
      padding: 32px 0;
      text-align: center;
      color: var(--text-faint);
      font-size: 13px;
    }

    .ft-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 12px;
      transition: opacity 300ms ease, max-height 300ms ease, padding 300ms ease, margin 300ms ease, border 300ms ease;
      overflow: hidden;
      max-height: 600px;
    }
    .ft-card.fading { opacity: 0; max-height: 0; padding: 0; margin: 0; border: 0; }

    .ft-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .ft-badge {
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      color: white;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ft-ts {
      font-size: 11px;
      color: var(--text-faint);
      margin-left: auto;
      white-space: nowrap;
    }

    .ft-label {
      font-size: 15px;
      font-weight: 500;
      color: var(--fg);
      margin: 4px 0;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .ft-meta {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .ft-conversation {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 8px 0 10px 0;
      padding: 10px 12px;
      background: var(--bg);
      border-left: 3px solid var(--border);
      border-radius: 0 6px 6px 0;
    }
    .ft-conv {
      display: flex;
      gap: 8px;
      font-size: 13px;
      line-height: 1.4;
      align-items: flex-start;
    }
    .ft-conv-role {
      flex: 0 0 auto;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
      min-width: 56px;
      text-align: center;
      white-space: nowrap;
    }
    .ft-conv-user .ft-conv-role { color: var(--accent); border-color: var(--accent); }
    .ft-conv-model .ft-conv-role {
      color: var(--badge-retrieval_answer, #2563eb);
      border-color: var(--badge-retrieval_answer, #2563eb);
    }
    .ft-conv-stimulus .ft-conv-role {
      color: var(--muted);
      border-color: var(--border);
      background: var(--card-bg);
    }
    .ft-conv-correction .ft-conv-role {
      color: var(--badge-draft_wa, #059669);
      border-color: var(--badge-draft_wa, #059669);
    }
    .ft-conv-correction .ft-conv-text {
      font-style: italic;
    }

    /* Strip compacto para el trigger de pushes no-conversacionales
     * (anticipate, proactive_push, brief). NO es chat — es metadata. */
    .ft-trigger-strip {
      display: flex;
      gap: 8px;
      align-items: baseline;
      font-size: 11px;
      color: var(--muted);
      padding: 4px 0;
      border-bottom: 1px dashed var(--border);
      margin-bottom: 6px;
    }
    .ft-trigger-label {
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .ft-trigger-text {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      color: var(--fg);
      opacity: 0.85;
      word-break: break-all;
    }

    /* Bloque prominente con el output del modelo (pushes anticipate /
     * proactive_push). Tipografía mediana, line-height generoso, soporta
     * markdown crudo (wikilinks, emoji, code spans inline). */
    .ft-model-output {
      font-size: 14px;
      line-height: 1.5;
      color: var(--fg);
      padding: 10px 12px;
      background: var(--card-bg);
      border-left: 3px solid var(--badge-anticipate, #fb923c);
      border-radius: 0 6px 6px 0;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .ft-conv-text {
      flex: 1;
      color: var(--fg);
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .ft-conv-faded .ft-conv-text { color: var(--muted); font-style: italic; }
    .ft-conv-link {
      font-size: 12px;
      margin-top: 2px;
    }
    .ft-conv-link a {
      color: var(--accent);
      text-decoration: none;
    }
    .ft-conv-link a:hover { text-decoration: underline; }

    .ft-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      align-items: center;
    }

    .ft-actions button {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 16px;
      color: var(--fg);
      font-family: inherit;
      transition: background 150ms, border-color 150ms;
    }
    .ft-actions button:hover { background: var(--hover); border-color: var(--border-strong); }
    .ft-actions button.btn-pos:hover { background: rgba(126, 231, 135, 0.15); border-color: var(--green); }
    .ft-actions button.btn-neg:hover { background: rgba(255, 123, 114, 0.15); border-color: var(--red); }
    .ft-actions button.btn-snooze:hover { background: rgba(227, 194, 122, 0.15); border-color: var(--yellow); }
    .ft-actions button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* CSS de .ft-comment / .ft-comment-actions removido post 2026-05-01
     * evening — el textarea de comment se eliminó (audit del día 1 mostró
     * 0 comments en 20 negatives → fricción inútil). Ambos botones ahora
     * fire-and-remove al primer click. */


    @media (max-width: 600px) {
      .ft-card { padding: 12px; margin-bottom: 10px; }
      .ft-actions button { padding: 10px 16px; font-size: 18px; }
    }

    /* Stats header — progreso hacia finetune jobs */
    .ft-stats {
      max-width: 720px;
      margin: 0 auto 18px auto;
      padding: 12px 14px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
    }
    .ft-stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px 20px;
      align-items: center;
      margin-bottom: 8px;
    }
    .ft-stats-row:last-child { margin-bottom: 0; }
    .ft-stats-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 130px;
      flex: 1 1 auto;
    }
    .ft-stats-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
    }
    .ft-stats-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--fg);
    }
    .ft-stats-bar {
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 4px;
    }
    .ft-stats-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan, #06b6d4), var(--green, #10b981));
      transition: width 400ms ease;
    }
    .ft-stats-bar-fill.warn { background: linear-gradient(90deg, var(--yellow, #eab308), var(--orange, #fb923c)); }
    .ft-stream-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 11px;
    }
    .ft-stream-chip {
      padding: 2px 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
    }
    .ft-stream-chip strong { color: var(--fg); font-weight: 600; }
    .ft-keyboard-hint {
      font-size: 10px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      margin-top: 4px;
    }
    .ft-keyboard-hint kbd {
      display: inline-block;
      padding: 1px 5px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--bg);
      font-size: 9px;
      margin: 0 1px;
    }
    .ft-card.ft-focused {
      outline: 2px solid var(--accent, #06b6d4);
      outline-offset: 1px;
    }
  </style>
</head>
<body>
  <a href="#content" class="skip-link">Saltar al contenido</a>

  <header class="hdr">
    <div class="hdr-l">
      <a href="/" class="brand">rag</a>
      <span class="sep">·</span>
      <span class="title">fine_tunning</span>
      <span id="ft-count" class="ft-subtitle"></span>
    </div>
    <div class="hdr-r">
      <button id="theme-toggle" class="btn-icon" type="button"
              aria-label="Alternar tema claro/oscuro">
        <span id="theme-icon" aria-hidden="true"></span>
      </button>
      <nav class="hdr-nav" aria-label="Navegación principal">
        <a href="/mirror">mirror</a>
        <a href="/wzp">wzp</a>
        <a href="/dashboard">dashboard</a>
        <a href="/finance">finance</a>
        <a href="/learning">learning</a>
        <a href="/status">status</a>
      </nav>
    </div>
  </header>

  <main id="content" tabindex="-1">
    <div id="ft-stats" class="ft-stats" hidden>
      <div class="ft-stats-row">
        <div class="ft-stats-item">
          <span class="ft-stats-label">ratings 7d</span>
          <span class="ft-stats-value" id="ft-stats-ratings-7d">—</span>
        </div>
        <div class="ft-stats-item" style="flex: 2 1 200px;">
          <span class="ft-stats-label">draft LoRA</span>
          <span class="ft-stats-value" id="ft-stats-draft-text">—</span>
          <div class="ft-stats-bar"><div class="ft-stats-bar-fill" id="ft-stats-draft-bar" style="width:0%"></div></div>
        </div>
        <div class="ft-stats-item" style="flex: 2 1 200px;">
          <span class="ft-stats-label">reranker LoRA</span>
          <span class="ft-stats-value" id="ft-stats-rerank-text">—</span>
          <div class="ft-stats-bar"><div class="ft-stats-bar-fill warn" id="ft-stats-rerank-bar" style="width:0%"></div></div>
        </div>
      </div>
      <div class="ft-stats-row">
        <div class="ft-stream-chips" id="ft-stream-chips"></div>
      </div>
      <div class="ft-keyboard-hint">
        atajos: <kbd>j</kbd>/<kbd>k</kbd> navegar · <kbd>1</kbd> 👍 · <kbd>2</kbd> 👎 · <kbd>s</kbd> snooze · <kbd>b</kbd> 👍 todos los drafts aprobados
      </div>
    </div>
    <div id="ft-queue"></div>
    <div id="ft-empty" hidden>🎉 Sin pendientes — volvé mañana</div>
  </main>

  <script>
    /* ── theme toggle ── */
    (function () {
      var btn = document.getElementById('theme-toggle');
      var icon = document.getElementById('theme-icon');
      function applyTheme(t) {
        document.documentElement.setAttribute('data-theme', t);
        try { localStorage.setItem('rag-theme', t); } catch (e) {}
        icon.textContent = t === 'light' ? '🌙' : '☀️';
      }
      var stored = null;
      try { stored = localStorage.getItem('rag-theme'); } catch (e) {}
      var initial = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      applyTheme(initial);
      btn.addEventListener('click', function () {
        var cur = document.documentElement.getAttribute('data-theme') || 'dark';
        applyTheme(cur === 'dark' ? 'light' : 'dark');
      });
    })();
  </script>

  <script>
    /* ── fine_tunning panel ── */
    (() => {
      const queueEl   = document.getElementById('ft-queue');
      const emptyEl   = document.getElementById('ft-empty');
      const subtitleEl = document.getElementById('ft-count');

      /* Streams 2026-05-12 (re-expansión): retrieval_answer + draft_wa
       * (outputs en contexto de conversación) + brief + anticipate
       * (pushes con loop cerrado vía rag_brief_feedback +
       *  rag_anticipate_feedback → auto-tune). */
      const STREAM_COLORS = {
        retrieval_answer: 'var(--badge-retrieval_answer, #2563eb)',
        draft:            'var(--badge-draft, #10b981)',
        draft_wa:         'var(--badge-draft_wa, #059669)',
        brief:            'var(--badge-brief, #8b5cf6)',
        anticipate:       'var(--badge-anticipate, #f59e0b)',
        proactive_push:   'var(--badge-proactive_push, #fb923c)',
        style:            'var(--badge-style, #ec4899)',
        tool_routing:     'var(--badge-tool_routing, #eab308)',
        read_summary:     'var(--badge-read_summary, #06b6d4)',
      };

      const STREAM_LABELS = {
        retrieval_answer: '💬 respuesta',
        draft:            '✉️ draft',
        draft_wa:         '💚 wa-draft',
        brief:            '📋 brief',
        anticipate:       '🔔 anticipate',
        proactive_push:   '⚡ proactive',
        style:            '🎨 estilo',
        tool_routing:     '🛠 tool',
        read_summary:     '📄 read',
      };

      /* IDs actualmente en el DOM (para merge en auto-refresh) */
      const activeIds = new Set();

      /* ── helpers ── */
      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function formatRelTime(iso) {
        if (!iso) return '';
        const ms = Date.now() - new Date(iso).getTime();
        const s = Math.round(ms / 1000);
        if (s < 60)          return 'hace un momento';
        const m = Math.round(s / 60);
        if (m < 60)          return `hace ${m}m`;
        const h = Math.round(m / 60);
        if (h < 24)          return `hace ${h}h`;
        const d = Math.round(h / 24);
        if (d < 30)          return `hace ${d}d`;
        const mo = Math.round(d / 30);
        return `hace ${mo} mes${mo > 1 ? 'es' : ''}`;
      }

      function buildMeta(item) {
        const parts = [];
        if (item.stream === 'retrieval_answer') {
          if (item.top_score != null) parts.push(`score=${item.top_score.toFixed(3)}`);
          else parts.push('score=null');
          if (item.paths && item.paths.length) parts.push(`${item.paths.length} paths`);
          if (item.meta && item.meta.response_source === 'vault') {
            parts.push('respuesta: vault');
          } else if (item.meta && item.meta.response_source === 'cache') {
            parts.push('respuesta: cache');
          }
        } else if (item.stream === 'draft' || item.stream === 'draft_wa') {
          if (item.meta && item.meta.contact) parts.push(`a ${item.meta.contact}`);
          if (item.meta && item.meta.decision) parts.push(`decisión: ${item.meta.decision}`);
        } else if (item.stream === 'brief') {
          if (item.meta && item.meta.brief_type) parts.push(item.meta.brief_type);
          if (item.meta && item.meta.n_paths) parts.push(`${item.meta.n_paths} citaciones`);
          if (item.meta && item.meta.n_sections) parts.push(`${item.meta.n_sections} secciones`);
        } else if (item.stream === 'anticipate') {
          if (item.meta && item.meta.kind) parts.push(item.meta.kind);
          if (item.top_score != null) parts.push(`score=${item.top_score.toFixed(2)}`);
        }
        return parts.join(' · ');
      }

      /* ── buildConversationContext ── render contexto de conversación
       *  según el stream (qué dijo el user vs qué respondió el modelo). */
      /* Devuelve { title, body } donde title va al header de la card y body
       * son los bloques (trigger compacto + bubbles según stream). */
      function buildConversationContext(item) {
        const m = item.meta || {};
        const blocks = [];
        let title = null;

        if (item.stream === 'retrieval_answer') {
          // Conversación real: chat-bubbles user → modelo
          title = 'Pregunta y respuesta';
          if (m.user_query || item.label) {
            blocks.push(bubble('user', escapeHtml(m.user_query || item.label), 'user'));
          }
          if (m.model_response) {
            blocks.push(bubble('modelo', escapeHtml(m.model_response), 'model'));
          } else {
            blocks.push(bubble('modelo',
              '<i>(respuesta no cacheada — abrí la conversación para verla)</i>',
              'model faded'));
          }
          if (m.conversation_path) {
            blocks.push(vaultLink(m.conversation_path, 'abrir conversación en Obsidian'));
          }

        } else if (item.stream === 'draft_wa') {
          // Conversación real: contacto → bot → tu edit
          title = `Draft a ${escapeHtml(m.contact || 'contacto')}`;
          if (m.contact_msg) {
            blocks.push(bubble(m.contact || 'contacto', escapeHtml(m.contact_msg), 'user'));
          }
          if (m.bot_draft) {
            blocks.push(bubble('bot drafteó', escapeHtml(m.bot_draft), 'model'));
          }
          if (m.sent_text && m.sent_text !== m.bot_draft) {
            blocks.push(bubble('vos enviaste', escapeHtml(m.sent_text), 'correction'));
          }

        } else if (item.stream === 'brief') {
          // Brief enviado: link a la nota episódica del vault + paths citados
          title = `Brief ${escapeHtml(m.brief_type || '?')}`;
          if (m.sections && m.sections.length) {
            blocks.push(bubble(
              'secciones',
              escapeHtml(m.sections.join(' · ')),
              'model faded'));
          }
          if (m.brief_path) {
            blocks.push(vaultLink(m.brief_path, 'abrir brief en Obsidian'));
          }
          if (item.paths && item.paths.length) {
            const list = item.paths.slice(0, 5).map(p => escapeHtml(p)).join('<br>');
            blocks.push(`<div class="ft-conv ft-conv-faded">
              <span class="ft-conv-role">citados</span>
              <span class="ft-conv-text">${list}</span></div>`);
          }

        } else if (item.stream === 'anticipate' || item.stream === 'proactive_push') {
          // Push enviado: kind + score + texto que vió el user
          title = m.kind ? `Push: ${escapeHtml(m.kind)}` : 'Push anticipatorio';
          if (m.message_preview) {
            blocks.push(bubble('agente envió', escapeHtml(m.message_preview), 'model'));
          }
          if (m.reason) {
            blocks.push(bubble('razón', escapeHtml(m.reason), 'model faded'));
          }
        }

        const bodyHtml = blocks.length
          ? `<div class="ft-conversation">${blocks.join('')}</div>`
          : '';
        return { title, body: bodyHtml };
      }

      function bubble(roleText, htmlText, roleClass) {
        return `<div class="ft-conv ft-conv-${roleClass}">
          <span class="ft-conv-role">${escapeHtml(roleText)}</span>
          <span class="ft-conv-text">${htmlText}</span>
        </div>`;
      }

      function vaultLink(relpath, linkText) {
        const url = `obsidian://open?vault=Notes&file=${encodeURIComponent(relpath.replace(/\.md$/, ''))}`;
        return `<div class="ft-conv-link"><a href="${url}" target="_blank">→ ${escapeHtml(linkText)}</a></div>`;
      }

      /* ── renderCard ── */
      function renderCard(item) {
        const uid = `${item.stream}::${item.item_id}`;
        if (activeIds.has(uid)) return null;
        activeIds.add(uid);

        const card = document.createElement('div');
        card.className = 'ft-card';
        card.dataset.uid = uid;
        card._itemMeta = item.meta || {};

        const color = STREAM_COLORS[item.stream] || '#888';
        const badgeText = STREAM_LABELS[item.stream] || item.stream;
        const meta  = buildMeta(item);
        const ctx = buildConversationContext(item);
        // Title viene del context builder cuando aplica (todos los streams
        // post-2026-05-01 tarde tienen title contextual). Fallback al label
        // crudo del item para forward-compat con streams futuros.
        const heading = ctx.title || item.label || item.item_id;

        card.innerHTML = `
          <div class="ft-card-header">
            <span class="ft-badge" style="background:${color}">${escapeHtml(badgeText)}</span>
            <span class="ft-ts">${formatRelTime(item.ts)}</span>
          </div>
          <div class="ft-label">${escapeHtml(heading)}</div>
          ${ctx.body}
          ${meta ? `<div class="ft-meta">${escapeHtml(meta)}</div>` : ''}
          <div class="ft-actions">
            <button class="btn-pos" title="Positivo" aria-label="Votar positivo">👍</button>
            <button class="btn-neg" title="Negativo" aria-label="Votar negativo">👎</button>
            <button class="btn-snooze" title="Snooze 24h" aria-label="Posponer 24 horas">💤</button>
          </div>
        `;

        const btnPos    = card.querySelector('.btn-pos');
        const btnNeg    = card.querySelector('.btn-neg');
        const btnSnooze = card.querySelector('.btn-snooze');

        // Ambos botones fire-and-remove al primer click — el textarea de
        // comment se removió post 2026-05-01 evening (audit del día 1
        // mostró 0 comments en 20 negatives → fricción inútil).
        // `heading` es el title que ya armó buildConversationContext +
        // fallbacks (ctx.title || item.label || item.item_id) — lo reusamos
        // como el `label` que sale al backend para que la row en
        // rag_ft_panel_ratings tenga texto humano-legible.
        btnPos.addEventListener('click', () => {
          handleRate(item.stream, item.item_id, 1, heading, null, item.session_id, card);
        });
        btnNeg.addEventListener('click', () => {
          handleRate(item.stream, item.item_id, -1, heading, null, item.session_id, card);
        });
        btnSnooze.addEventListener('click', () => {
          handleSnooze(item.stream, item.item_id, card);
        });

        return card;
      }

      /* ── animación de salida ── */
      function fadeRemove(card) {
        const uid = card.dataset.uid;
        card.classList.add('fading');
        // setTimeout fallback: transitionend a veces no dispara (browsers
        // quisquillosos con `border` en transition shorthand, o si la card
        // tenía display:none implícito en algún ancestor). El timeout >= la
        // duración del transition (300ms) garantiza la remoción aunque el
        // event nunca llegue. Doble-fire es seguro: card.remove() es
        // idempotente y activeIds.delete() también.
        let removed = false;
        const removeOnce = () => {
          if (removed) return;
          removed = true;
          card.remove();
          activeIds.delete(uid);
          updateSubtitle();
          updateEmpty();
        };
        card.addEventListener('transitionend', removeOnce, { once: true });
        setTimeout(removeOnce, 350);
      }

      /* ── acciones remotas ── */
      async function handleRate(stream, itemId, rating, label, comment, sessionId, card) {
        const btns = card.querySelectorAll('button');
        btns.forEach(b => { b.disabled = true; });
        try {
          const resp = await fetch('/api/fine_tunning/rate', { /* POST /api/fine_tunning/rate */
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ stream, item_id: itemId, rating, label, comment: comment || null, session_id: sessionId || null }),
          });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          fadeRemove(card);
          fetchStats();  // refresh contadores tras cada rating
        } catch (err) {
          btns.forEach(b => { b.disabled = false; });
          alert('Error al guardar — reintentá');
        }
      }

      async function handleSnooze(stream, itemId, card) {
        const btns = card.querySelectorAll('button');
        btns.forEach(b => { b.disabled = true; });
        try {
          const resp = await fetch('/api/fine_tunning/snooze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ item_id: itemId, stream, hours: 24 }),
          });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          fadeRemove(card);
        } catch (err) {
          btns.forEach(b => { b.disabled = false; });
          alert('Error al guardar — reintentá');
        }
      }

      /* ── UI helpers ── */
      function updateSubtitle() {
        const n = queueEl.querySelectorAll('.ft-card:not(.fading)').length;
        subtitleEl.textContent = n > 0 ? `· ${n} pendiente${n !== 1 ? 's' : ''}` : '';
      }

      function updateEmpty() {
        const n = queueEl.querySelectorAll('.ft-card:not(.fading)').length;
        emptyEl.hidden = n > 0;
      }

      /* ── fetch + render ── */
      async function fetchQueue() {
        try {
          const resp = await fetch('/api/fine_tunning/queue?limit=40&days=30');
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const data = await resp.json();
          const items = data.items || [];

          /* quitar loader si está */
          const loader = queueEl.querySelector('.ft-loading');
          if (loader) loader.remove();

          items.forEach(item => {
            const card = renderCard(item);
            if (card) queueEl.appendChild(card);
          });

          updateSubtitle();
          updateEmpty();
          updateFocus();
        } catch (err) {
          const loader = queueEl.querySelector('.ft-loading');
          if (loader) loader.textContent = 'Error al cargar — reintentando…';
        }
      }

      /* ── stats header ── */
      async function fetchStats() {
        try {
          const resp = await fetch('/api/fine_tunning/stats');
          if (!resp.ok) return;
          const s = await resp.json();
          const statsEl = document.getElementById('ft-stats');
          statsEl.hidden = false;

          document.getElementById('ft-stats-ratings-7d').textContent = s.ratings_7d ?? 0;

          const dl = s.draft_lora || {};
          document.getElementById('ft-stats-draft-text').textContent =
            `${dl.current ?? 0}/${dl.target ?? 100} pares`;
          document.getElementById('ft-stats-draft-bar').style.width = `${dl.pct ?? 0}%`;

          const rl = s.reranker_lora || {};
          document.getElementById('ft-stats-rerank-text').textContent =
            `${rl.correctives ?? 0}/${rl.target_correctives ?? 20} correctives` +
            ` · ${rl.positives ?? 0}/${rl.target_positives ?? 10} pos`;
          document.getElementById('ft-stats-rerank-bar').style.width = `${rl.pct ?? 0}%`;

          const chipsEl = document.getElementById('ft-stream-chips');
          chipsEl.innerHTML = '';
          const pbs = s.pending_by_stream || {};
          for (const [k, v] of Object.entries(pbs)) {
            if (v <= 0) continue;
            const chip = document.createElement('span');
            chip.className = 'ft-stream-chip';
            const label = (STREAM_LABELS[k] || k).replace(/^.{2}\s/, '');
            chip.innerHTML = `${label}: <strong>${v}</strong>`;
            chipsEl.appendChild(chip);
          }
        } catch (e) { /* silent */ }
      }

      /* ── keyboard navigation ── */
      let focusedIdx = -1;
      function visibleCards() {
        return Array.from(queueEl.querySelectorAll('.ft-card:not(.fading)'));
      }
      function updateFocus() {
        const cards = visibleCards();
        cards.forEach(c => c.classList.remove('ft-focused'));
        if (focusedIdx < 0 || focusedIdx >= cards.length) {
          focusedIdx = cards.length > 0 ? 0 : -1;
        }
        if (focusedIdx >= 0) {
          cards[focusedIdx].classList.add('ft-focused');
          cards[focusedIdx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
      }
      document.addEventListener('keydown', (e) => {
        // Ignorar si el foco está en input/textarea
        if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
        if (e.metaKey || e.ctrlKey || e.altKey) return;
        const cards = visibleCards();
        if (cards.length === 0) return;
        const cur = cards[focusedIdx];
        switch (e.key) {
          case 'j':
          case 'ArrowDown':
            focusedIdx = Math.min(focusedIdx + 1, cards.length - 1);
            updateFocus();
            e.preventDefault();
            break;
          case 'k':
          case 'ArrowUp':
            focusedIdx = Math.max(focusedIdx - 1, 0);
            updateFocus();
            e.preventDefault();
            break;
          case '1':
            if (cur) cur.querySelector('.btn-pos')?.click();
            e.preventDefault();
            break;
          case '2':
            if (cur) cur.querySelector('.btn-neg')?.click();
            e.preventDefault();
            break;
          case 's':
            if (cur) cur.querySelector('.btn-snooze')?.click();
            e.preventDefault();
            break;
          case 'b':
            bulkApproveDrafts();
            e.preventDefault();
            break;
        }
      });

      /* ── bulk approve drafts (b key) ──
       * Marca 👍 a todos los drafts WA visibles con decision='approved_si'
       * (vos los mandaste tal cual los drafteó el bot → 👍 implícito).
       * Útil después de un día normal donde el bot acertó la mayoría. */
      async function bulkApproveDrafts() {
        const cards = visibleCards();
        const targets = cards.filter(c => {
          const uid = c.dataset.uid || '';
          if (!uid.startsWith('draft_wa::')) return false;
          const meta = c._itemMeta || {};
          return meta.decision === 'approved_si';
        });
        if (targets.length === 0) {
          alert('No hay drafts approved_si visibles para bulk-approve.');
          return;
        }
        if (!confirm(`Marcar 👍 a ${targets.length} drafts approved_si?`)) return;
        for (const card of targets) {
          card.querySelector('.btn-pos')?.click();
          await new Promise(r => setTimeout(r, 60));
        }
      }

      /* ── init ── */
      queueEl.innerHTML = '<div class="ft-loading">cargando…</div>';
      fetchQueue();
      fetchStats();
      setInterval(fetchQueue, 60000);
      setInterval(fetchStats, 60000);
    })();
  </script>
</body>
</html>
