[project]
name = "obsidian-rag"
version = "0.1.0"
description = "Add your description here"
requires-python = ">=3.13"
dependencies = [
    "chromadb>=1.5.7",
    "click>=8.3.2",
    "ollama>=0.6.1",
    "rank-bm25>=0.2.2",
    "rich>=15.0.0",
    "pyyaml>=6.0",
    "sentence-transformers>=3.0",
    "mcp>=1.0",
    "watchdog>=6.0.0",
]

[project.scripts]
rag = "rag:cli"
obsidian-rag-mcp = "mcp_server:main"

[tool.setuptools]
py-modules = ["rag", "mcp_server"]
