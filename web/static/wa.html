<!DOCTYPE html>
<html lang="es-AR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>rag · wzp</title>
  <link rel="stylesheet" href="/static/wa.css?v=53">
  <link rel="manifest" href="/static/manifest-wzp.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/pwa/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/pwa/favicon-16.png">
  <link rel="apple-touch-icon" href="/static/pwa/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="rag·wzp">
  <meta name="theme-color" content="#0a0e14">
  <script>
    // Restaurar theme antes del primer paint para evitar flash.
    (function () {
      try {
        var t = localStorage.getItem("wa-theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
    // Forzar update del Service Worker antes que cualquier otra cosa.
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then((rs) => {
        rs.forEach((r) => r.update());
      });
    }
  </script>
</head>
<body data-pane="sidebar">
  <!-- Liquid Glass refraction filter (Apple WWDC25 inspired). El
       feTurbulence + feDisplacementMap simulan refracción tipo lente
       en lugar del plain blur. Aplicado vía `filter: url(#liquid-glass)`
       en surfaces glass. baseFrequency low + scale moderado → distorsión
       sutil sin marearse. -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <filter id="liquid-glass" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.018 0.012" numOctaves="2" seed="3" result="turb"/>
        <feDisplacementMap in="SourceGraphic" in2="turb" scale="6" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>
  <div class="wa-app">
    <!-- Sidebar: lista de chats -->
    <aside class="wa-sidebar" aria-label="Lista de chats">
      <header class="wa-sidebar-header">
        <div class="wa-app-title">
          <span class="wa-brand-rag">rag</span><span class="accent">·</span><span class="wa-brand-wa">wzp</span>
          <span class="wa-brand-version" aria-hidden="true">v.04</span>
        </div>
        <div class="wa-header-right">
          <button class="wa-theme-toggle" id="wa-theme-toggle"
                  type="button"
                  title="cambiar tema (oscuro / claro)"
                  aria-label="cambiar tema">
            <span class="wa-theme-icon wa-theme-icon-dark" aria-hidden="true">◐</span>
            <span class="wa-theme-icon wa-theme-icon-light" aria-hidden="true">◑</span>
          </button>
          <div class="wa-conn-indicator" id="wa-conn" title="estado del bridge" aria-live="polite">
            <span class="wa-signal-bars" aria-hidden="true">
              <i></i><i></i><i></i><i></i><i></i>
            </span>
            <span class="wa-conn-label">ONLINE</span>
          </div>
        </div>
      </header>
      <nav class="wa-sidebar-nav" aria-label="otras páginas">
        <a href="/mirror">mirror</a>
        <a href="/chat">chat</a>
        <a href="/wzp" class="current">wzp</a>
        <a href="/dashboard">dashboard</a>
        <a href="/finance">finance</a>
        <a href="/blacklist">blacklist</a>
      </nav>
      <div class="wa-search-box">
        <input type="search" id="wa-search-input" placeholder="buscar chat o mensaje…" autocomplete="off">
        <div class="wa-search-mode" id="wa-search-mode" role="group" aria-label="modo de búsqueda" hidden>
          <button type="button" class="wa-search-mode-btn active" data-mode="fts" title="Match exacto (FTS5)">texto</button>
          <button type="button" class="wa-search-mode-btn" data-mode="semantic" title="Por significado (embeddings)">semántico</button>
        </div>
      </div>
      <ul class="wa-chatlist" id="wa-chatlist" aria-live="polite"></ul>
      <div class="wa-chatlist-loading" id="wa-chatlist-loading">
        <span class="wa-loader-glyph">◜</span>
        sincronizando bridge
      </div>
      <footer class="wa-sidebar-footer" id="wa-sidebar-footer" aria-live="polite">
        <span class="wa-stat">
          <span class="wa-stat-num" id="wa-stat-chats">–</span>
          <span class="wa-stat-label">CHATS</span>
        </span>
        <span class="wa-stat-sep">│</span>
        <span class="wa-stat">
          <span class="wa-stat-num" id="wa-stat-unread">–</span>
          <span class="wa-stat-label">UNREAD</span>
        </span>
        <span class="wa-stat-sep">│</span>
        <span class="wa-stat wa-stat-mood" id="wa-stat-mood" hidden
              title="resumen mood 7d">
          <span class="wa-stat-mood-icon" id="wa-stat-mood-icon" aria-hidden="true">—</span>
          <span class="wa-stat-label">7D</span>
        </span>
        <span class="wa-stat-sep">│</span>
        <span class="wa-stat wa-stat-clock" id="wa-stat-clock" title="hora local">––:––</span>
      </footer>
    </aside>

    <!-- Thread: hilo del chat activo -->
    <main class="wa-thread" id="wa-thread">
      <header class="wa-thread-header">
        <button class="wa-back-btn" id="wa-back-btn" aria-label="Volver a chats">←</button>
        <div class="wa-thread-avatar" id="wa-thread-avatar" aria-hidden="true"></div>
        <div class="wa-thread-meta">
          <div class="wa-thread-name" id="wa-thread-name"></div>
          <div class="wa-thread-presence" id="wa-thread-presence"></div>
        </div>
      </header>
      <div class="wa-thread-body" id="wa-thread-body">
        <div class="wa-empty-state" id="wa-empty-state">
          <p>Seleccioná un chat para ver los mensajes.</p>
        </div>
      </div>
      <footer class="wa-composer idle" id="wa-composer">
        <textarea
          id="wa-composer-input"
          placeholder=""
          rows="1"
        ></textarea>
        <div class="wa-composer-kbd" aria-hidden="true">
          <kbd>↵</kbd> enviar
          <span class="wa-kbd-sep">·</span>
          <kbd>⇧↵</kbd> nueva línea
          <span class="wa-kbd-sep">·</span>
          <kbd>dbl-click</kbd> responder
        </div>
        <button class="wa-mic-btn" id="wa-mic-btn"
                type="button"
                title="grabar voice note (whisper + opus PTT)"
                aria-label="grabar audio"
                disabled>
          <span class="wa-mic-icon" aria-hidden="true">●</span>
        </button>
        <button class="wa-tts-btn" id="wa-tts-btn"
                type="button"
                title="enviar como voz · TTS Mónica + opus PTT"
                aria-label="enviar texto como voz"
                disabled>
          <span aria-hidden="true">🎙</span>
        </button>
        <button class="wa-send-btn" id="wa-send-btn" aria-label="enviar (Enter)" title="enviar · Enter">
          <span class="wa-send-label">enviar</span>
          <span class="wa-send-arrows" aria-hidden="true">⏎</span>
        </button>
        <div class="wa-record-bar" id="wa-record-bar" hidden>
          <span class="wa-record-dot" aria-hidden="true"></span>
          <span class="wa-record-label">Grabando</span>
          <span class="wa-record-timer" id="wa-record-timer">0:00</span>
          <button class="wa-record-cancel" id="wa-record-cancel" type="button"
                  title="Cancelar grabación (Esc)" aria-label="Cancelar grabación">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none"
                 stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                 stroke-linejoin="round" aria-hidden="true">
              <line x1="6" y1="6" x2="18" y2="18"/>
              <line x1="18" y1="6" x2="6" y2="18"/>
            </svg>
            <span>Cancelar</span>
          </button>
          <button class="wa-record-stop" id="wa-record-stop" type="button"
                  title="Detener y enviar (Enter)" aria-label="Detener grabación">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"
                 aria-hidden="true">
              <rect x="6" y="6" width="12" height="12" rx="2"/>
            </svg>
            <span>Detener</span>
          </button>
        </div>
      </footer>
    </main>
  </div>

  <!-- admin-auth.js: monkey-patchea fetch() para inyectar Bearer del
       admin_token en endpoints admin (entre ellos `/api/wa/revoke` para
       borrar mensajes propios). Loopback-only — un device LAN/tunnel
       no recibe el token y el delete falla server-side con 401. -->
  <script src="/static/admin-auth.js"></script>
  <script type="module" src="/static/js/wa/wa.js?v=50"></script>
</body>
</html>
