<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rag</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem("rag-theme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body { overflow-y: auto; }

    main#home {
      max-width: 1200px;
      margin: 0 auto;
      padding: 72px 20px 80px;
    }

    .home-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }
    .home-head h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--cyan);
    }
    .home-head h2 .date {
      color: var(--text-faint);
      font-weight: 400;
      margin-left: 10px;
    }
    .home-actions { display: flex; gap: 10px; align-items: center; }
    .home-btn {
      background: var(--bg-elev);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 5px 12px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      border-radius: 4px;
    }
    .home-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .home-btn[disabled] { opacity: 0.5; cursor: progress; }

    .status-line {
      font-size: 11px;
      color: var(--text-faint);
      margin-bottom: 26px;
    }
    .status-line .dot { color: var(--green); }
    .status-line .dot.stale { color: var(--yellow); }
    .status-line .dot.gen { color: var(--cyan); }

    /* ── Urgent banner ──────────────────────────────────────────── */
    .urgent {
      background: color-mix(in srgb, var(--red) 8%, transparent);
      border: 1px solid color-mix(in srgb, var(--red) 30%, transparent);
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 22px;
    }
    .urgent h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--red);
      margin-bottom: 8px;
    }
    .urgent ul { list-style: none; }
    .urgent li {
      padding: 4px 0;
      font-size: 13px;
      color: var(--text);
    }

    /* ── Narrative card (today brief) ──────────────────────────── */
    .narrative {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px 22px;
      margin-bottom: 28px;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.65;
    }
    .narrative h2 {
      font-size: 14px;
      font-weight: 700;
      color: var(--cyan);
      margin: 18px 0 6px;
    }
    .narrative h2:first-child { margin-top: 0; }
    .narrative p { margin-bottom: 10px; color: var(--text); }
    .narrative ul { margin: 4px 0 10px 22px; }
    .narrative li { margin-bottom: 4px; color: var(--text-dim); }
    .narrative a { color: var(--cyan); text-decoration: none; }
    .narrative a:hover { text-decoration: underline; }
    .narrative code { color: var(--yellow); font-size: 13px; }

    /* ── Panel grid (channels) ─────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .panel {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      min-height: 120px;
    }
    .panel .head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .panel .head h3 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }
    .panel .head .count {
      font-size: 11px;
      color: var(--text-faint);
      font-weight: 400;
    }
    .panel ul { list-style: none; flex: 1; }
    .panel li {
      padding: 7px 0;
      border-bottom: 1px dashed color-mix(in srgb, var(--border) 60%, transparent);
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--text);
    }
    .panel li:last-child { border-bottom: none; }
    .panel li b { color: var(--text); font-weight: 600; }
    .panel li .meta {
      display: block;
      color: var(--text-faint);
      font-size: 11px;
      margin-top: 2px;
    }
    .panel li .snippet {
      color: var(--text-dim);
      font-size: 12px;
      margin-top: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .panel li a { color: inherit; text-decoration: none; }
    .panel li a:hover { color: var(--cyan); }

    .panel .empty {
      padding: 20px 0;
      text-align: center;
      color: var(--text-faint);
      font-size: 12px;
      font-style: italic;
    }

    .bucket {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      margin-right: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .bucket.overdue   { background: color-mix(in srgb, var(--red) 15%, transparent);    color: var(--red); }
    .bucket.today     { background: color-mix(in srgb, var(--cyan) 15%, transparent);   color: var(--cyan); }
    .bucket.tomorrow  { background: color-mix(in srgb, var(--purple) 15%, transparent); color: var(--purple); }
    .bucket.undated   { background: color-mix(in srgb, var(--border-strong) 40%, transparent); color: var(--text-dim); }
    .bucket.stale     { background: color-mix(in srgb, var(--yellow) 15%, transparent); color: var(--yellow); }
    .bucket.activo    { background: color-mix(in srgb, var(--green) 15%, transparent);  color: var(--green); }
    .bucket.sin-tags  { background: color-mix(in srgb, var(--yellow) 15%, transparent); color: var(--yellow); }

    .error {
      padding: 16px;
      background: color-mix(in srgb, var(--red) 10%, transparent);
      border: 1px solid var(--red);
      border-radius: 4px;
      color: var(--red);
      font-size: 13px;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      main#home { padding: 64px 12px 40px; }
      .home-head { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <header id="topbar">
    <div class="topbar-inner">
      <h1 class="topbar-title">rag <span>· home</span></h1>
      <div class="topbar-meta">
        <a class="topbar-link" href="/chat">chat →</a>
        <a class="topbar-link" href="/dashboard">dashboard →</a>
      </div>
    </div>
  </header>
  <main id="home">
    <div class="home-head">
      <h2>hoy<span class="date" id="date-label">—</span></h2>
      <div class="home-actions">
        <button class="home-btn" id="btn-reload">recargar</button>
        <button class="home-btn" id="btn-regenerate">regenerar brief</button>
      </div>
    </div>
    <div class="status-line" id="status-line">cargando…</div>
    <div id="urgent-wrap"></div>
    <div id="narrative-wrap"></div>
    <div class="grid" id="panels"></div>
    <div id="error-wrap"></div>
  </main>
  <script src="/static/vendor/marked.min.js"></script>
  <script src="/static/home.js"></script>
</body>
</html>
