[project]
name = "obsidian-rag"
version = "0.1.0"
description = "Local RAG over an Obsidian vault — sqlite-vec + Ollama + sentence-transformers, no cloud calls."
requires-python = ">=3.13"
dependencies = [
    "sqlite-vec>=0.1.6",
    "fastapi>=0.110",
    "uvicorn>=0.27",
    "click>=8.3.2",
    "ollama>=0.6.1",
    "rank-bm25>=0.2.2",
    "rich>=15.0.0",
    "pyyaml>=6.0",
    "sentence-transformers>=3.0",
    "mcp>=1.0",
    "watchdog>=6.0.0",
    "google-api-python-client>=2.0",
    "google-auth>=2.0",
    "youtube-transcript-api>=1.0",
]

[project.optional-dependencies]
dev = ["pytest>=9.0"]

[project.scripts]
rag = "rag:cli"
obsidian-rag-mcp = "mcp_server:main"

[tool.setuptools]
py-modules = ["rag", "mcp_server"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
# E402: module-level imports after logging/warnings configuration are intentional.
# E741: `l` is not used anywhere in rag.py after cleanup.
extend-ignore = ["E402"]
