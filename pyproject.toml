[project]
name = "obsidian-rag"
version = "0.1.0"
description = "Local RAG over an Obsidian vault — sqlite-vec + Ollama + sentence-transformers, no cloud calls."
requires-python = ">=3.13"
dependencies = [
    "sqlite-vec>=0.1.6",
    "fastapi>=0.110",
    "uvicorn>=0.27",
    "click>=8.3.2",
    "ollama>=0.6.1",
    "rank-bm25>=0.2.2",
    "rich>=15.0.0",
    "pyyaml>=6.0",
    # sentence-transformers is CORE (not optional): CrossEncoder is the
    # reranker used on every retrieve() call (rag.py:7469). Moving it to
    # an extra would break the default install. Local-embed path
    # (RAG_LOCAL_EMBED=1, rag.py:6770) reuses the same lib via
    # SentenceTransformer — no separate dep needed.
    "sentence-transformers>=3.0",
    "mcp>=1.0",
    "watchdog>=6.0.0",
    "google-api-python-client>=2.0",
    "google-auth>=2.0",
    "google-auth-oauthlib>=1.2",
    "youtube-transcript-api>=1.0",
    "dateparser>=1.2",
    # OCR on embedded images during indexing (rag.py:_ocr_image). Uses Apple
    # Vision via pyobjc — macOS-only. On non-macOS hosts the import fails
    # and the indexer silent-skips OCR. Enables queries like "en qué cycle
    # estamos" to hit notes whose informative content sits in a screenshot
    # rather than the markdown body. Toggle OFF with `RAG_OCR=0`.
    "ocrmac>=1.0",
]

[project.optional-dependencies]
dev = ["pytest>=9.0", "pytest-xdist>=3.6", "pytest-cov>=5.0"]
# Spotify recently-played ingest (`rag index` picks up per-day notes
# under 03-Resources/Spotify/). Opt-in because it needs a user-supplied
# `~/.config/obsidian-rag/spotify_client.json` with OAuth client ID +
# secret; 99% of users never configure it. Code path is guarded by
# `try: import spotipy` (rag.py:6035) + a SPOTIFY_CLIENT_ID env check,
# so a missing install degrades gracefully (ETL skipped, not crash).
# Install: `uv pip install obsidian-rag[spotify]`
spotify = ["spotipy>=2.23"]

[project.scripts]
rag = "rag:cli"
obsidian-rag-mcp = "mcp_server:main"

[tool.setuptools]
py-modules = ["rag", "mcp_server"]
packages = ["scripts", "web"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "slow: multi-process stress tests (>1s wall; opt-out with `-m 'not slow'`)",
]

[tool.ruff]
line-length = 100
target-version = "py313"
# Run across the whole project by default. CI passes explicit src=...
# but local `ruff check` with no args should mirror CI.
src = ["rag.py", "mcp_server.py", "web", "scripts"]

[tool.ruff.lint]
# E402: module-level imports after logging/warnings configuration are intentional
#       (rag.py bootstraps quiet/env-toggles before heavyweight imports).
# E741: ambiguous variable name `l` / `I` — used locally in a handful of
#       short-scoped comprehensions; no practical confusion, not worth a rename.
# E731: lambda assignment — three legit one-liners in web/server.py that are
#       clearer as lambdas than tiny named defs.
# E701/E702: multiple statements on one line — isolated instances in legacy
#       data-migration code; stylistic, not a bug source.
# F811: redefined-while-unused — a few `import sqlite3 as _sqlite3` shadows
#       inside SqliteVecCollection are intentional (local alias).
# F841: unused-variable — mostly deliberate (`_ = …` idiom without the
#       underscore). Enforcing would flag lots of benign assignments.
# F821: undefined-name — two string-quoted forward references ("sqlite3.Connection",
#       "OrderedDict") that resolve at runtime via local imports; ruff can't see
#       through the quoted annotations.
extend-ignore = ["E402", "E701", "E702", "E731", "E741", "F811", "F821", "F841"]
