<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover: permite que el bg llegue hasta los bordes en iPhones
       con notch / Dynamic Island; la safe-area-inset-* del CSS evita que el
       contenido quede tapado. -->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- iOS Safari: status-bar + app-like behaviour si el user 'Add to Home Screen'. -->
  <meta name="theme-color" content="#1a1a1f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="rag">
  <title>rag</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem("rag-theme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
      } catch (e) {}
    })();
  </script>

  <!-- ── PWA wiring (ver index.html para nota de regeneración) ───── -->
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/pwa/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/pwa/favicon-16.png">
  <link rel="apple-touch-icon" href="/static/pwa/apple-touch-icon.png">
  <link rel="apple-touch-startup-image" href="/static/pwa/splash-iphone-x.png"
        media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/static/pwa/splash-iphone-xr.png"
        media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/static/pwa/splash-iphone-xs-max.png"
        media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/static/pwa/splash-iphone-12-mini.png"
        media="(device-width: 360px) and (device-height: 780px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/static/pwa/splash-iphone-12.png"
        media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/static/pwa/splash-iphone-12-pro-max.png"
        media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/static/pwa/splash-iphone-14-pro.png"
        media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/static/pwa/splash-iphone-14-pro-max.png"
        media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/static/pwa/splash-iphone-16-pro.png"
        media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">
  <link rel="apple-touch-startup-image" href="/static/pwa/splash-iphone-16-pro-max.png"
        media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)">

  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/pwa/register-sw.js" defer></script>
  <style>
    body { overflow-y: auto; }

    /* ── Top progress bar ─────────────────────────────────────── */
    /* Indeterminate shimmer while /api/home is inflight. Cheap to draw
       (2px tall, one element, GPU-accelerated transform). Fades out on
       success/error so the bar isn't permanently visible. */
    #progress {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      z-index: 20;
      background: transparent;
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
      transition: opacity 200ms ease-out;
    }
    #progress.active { opacity: 1; }
    #progress::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 40%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        var(--cyan) 50%,
        transparent 100%
      );
      animation: progress-slide 1.1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes progress-slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* ── Pulse dot (status line) ──────────────────────────────── */
    .status-line .dot.loading {
      animation: pulse 1.1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50%      { opacity: 1; }
    }

    /* ── Shimmer for skeleton panels on first load ───────────── */
    .panel.loading {
      position: relative;
      overflow: hidden;
    }
    .panel.loading::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        transparent 0%,
        color-mix(in srgb, var(--cyan) 6%, transparent) 50%,
        transparent 100%
      );
      animation: shimmer 1.6s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .skel-line {
      height: 10px;
      background: var(--border);
      border-radius: 3px;
      margin: 10px 0;
    }
    .skel-line.w60 { width: 60%; }
    .skel-line.w80 { width: 80%; }
    .skel-line.w40 { width: 40%; }

    main#home {
      max-width: 1200px;
      margin: 0 auto;
      padding: 72px 20px 80px;
    }

    .home-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }
    .home-head h2 {
      font-size: 26px;
      font-weight: 700;
      color: var(--cyan);
      letter-spacing: -0.01em;
    }
    .home-head h2 .date {
      color: var(--text-faint);
      font-weight: 400;
      font-size: 14px;
      margin-left: 12px;
      letter-spacing: 0;
    }
    .home-actions { display: flex; gap: 10px; align-items: center; }
    .home-btn {
      background: var(--bg-elev);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 5px 12px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      border-radius: 4px;
    }
    .home-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .home-btn[disabled] { opacity: 0.5; cursor: progress; }
    .home-btn-icon { display: inline-flex; align-items: center; gap: 6px; }
    .refresh-icon { width: 14px; height: 14px; display: block; }
    .home-btn-icon.spinning .refresh-icon { animation: refresh-spin 1s linear infinite; }
    @keyframes refresh-spin { to { transform: rotate(360deg); } }

    .status-line {
      font-size: 12px;
      color: var(--text-faint);
      margin-bottom: 28px;
      padding-top: 4px;
    }
    .status-line .dot { margin-right: 4px; }
    .status-line .dot { color: var(--green); }
    .status-line .dot.stale { color: var(--yellow); }
    .status-line .dot.gen { color: var(--cyan); }
    .status-slow { color: var(--yellow); }

    /* ── Urgent banner ──────────────────────────────────────────── */
    .urgent {
      background: color-mix(in srgb, var(--red) 8%, transparent);
      border: 1px solid color-mix(in srgb, var(--red) 30%, transparent);
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 22px;
    }
    .urgent h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--red);
      margin-bottom: 8px;
    }
    .urgent ul { list-style: none; }
    .urgent li {
      padding: 4px 0;
      font-size: 13px;
      color: var(--text);
    }

    /* ── Narrative card (today brief) ──────────────────────────── */
    .narrative {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px 22px;
      margin-bottom: 28px;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.65;
    }
    .narrative.narrative-pending {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }
    .narrative.narrative-filled { position: relative; }
    .narrative .narrative-refresh {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 5px 7px;
    }
    .narrative .narrative-refresh span { display: none; }
    .narrative h2 {
      font-size: 14px;
      font-weight: 700;
      color: var(--cyan);
      margin: 18px 0 6px;
    }
    .narrative h2:first-child { margin-top: 0; }
    .narrative p { margin-bottom: 10px; color: var(--text); }
    .narrative ul { margin: 4px 0 10px 22px; }
    .narrative li { margin-bottom: 4px; color: var(--text-dim); }
    .narrative a { color: var(--cyan); text-decoration: none; }
    .narrative a:hover { text-decoration: underline; }
    .narrative code { color: var(--yellow); font-size: 13px; }

    /* ── "Para mañana" → Apple Reminder shortcut ───────────────
       Each <li> under the "Para mañana" heading gets an inline
       enter-arrow button. Faint by default so the narrative reads
       clean; shows on hover. Click posts to /api/reminders/create
       with due=tomorrow 09:00. Successful create → green check. */
    .narrative .add-reminder-btn {
      background: transparent;
      border: none;
      color: var(--text-faint);
      padding: 1px 4px;
      margin-left: 6px;
      cursor: pointer;
      vertical-align: -2px;
      opacity: 0;
      border-radius: 3px;
      transition: opacity 120ms ease, color 120ms ease, transform 140ms ease;
    }
    .narrative li:hover .add-reminder-btn,
    .narrative .add-reminder-btn.err,
    .narrative li.reminder-created .add-reminder-btn { opacity: 0.85; }
    .narrative .add-reminder-btn:hover { color: var(--cyan); opacity: 1; }
    .narrative .add-reminder-btn:active { transform: translateY(1px); }
    .narrative .add-reminder-btn.loading svg { animation: refresh-spin 1s linear infinite; }
    .narrative .add-reminder-btn.err { color: var(--red); }
    .narrative li.reminder-created { color: var(--text-dim); }
    .narrative li.reminder-created .add-reminder-btn { color: var(--green); cursor: default; }
    .narrative li.reminder-created .add-reminder-btn svg { display: none; }
    .narrative li.reminder-created .add-reminder-btn::after {
      content: "✓"; font-size: 12px; line-height: 1;
    }

    /* ── Panel grid (channels) ─────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .panel {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      min-height: 120px;
    }
    .panel .head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .panel .head h3 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      flex: 0 1 auto;
    }
    .panel .head .count {
      font-size: 11px;
      color: var(--text-faint);
      font-weight: 400;
      margin-left: auto;
    }
    .panel .head .collapse-btn {
      background: transparent;
      border: none;
      color: var(--text-faint);
      padding: 2px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 120ms ease, color 120ms ease;
    }
    .panel:hover .head .collapse-btn,
    .panel.user-collapsed .head .collapse-btn { opacity: 0.75; }
    .panel .head .collapse-btn:hover { color: var(--cyan); opacity: 1; }
    .panel .head .collapse-btn svg {
      display: block;
      transition: transform 160ms ease;
    }
    .panel.user-collapsed .head .collapse-btn svg { transform: rotate(180deg); }
    .panel { min-width: 0; overflow: hidden; }
    .panel ul { list-style: none; flex: 1; min-width: 0; }
    .panel li {
      padding: 7px 0;
      border-bottom: 1px dashed color-mix(in srgb, var(--border) 60%, transparent);
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--text);
      overflow-wrap: anywhere;
      word-break: break-word;
      min-width: 0;
    }
    .panel li:last-child { border-bottom: none; }
    .panel li b { color: var(--text); font-weight: 600; }
    .panel li .meta {
      display: block;
      color: var(--text-faint);
      font-size: 11px;
      margin-top: 2px;
    }
    .panel li .snippet {
      color: var(--text-dim);
      font-size: 12px;
      margin-top: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .panel li a { color: inherit; text-decoration: none; }
    .panel li a:hover { color: var(--cyan); }

    .panel .empty {
      padding: 20px 0;
      text-align: center;
      color: var(--text-faint);
      font-size: 12px;
      font-style: italic;
    }
    /* Collapsed shell — shared styling for auto-empty panels AND panels
       the user explicitly folded. Title row stays, body is gone.
       Grid order is controlled from JS (applyPanelState) so filled
       panels can be ranked by importance; auto-empties sink to
       1000+priority. `align-self:start` stops grid-row stretching. */
    .panel:has(.empty),
    .panel.user-collapsed {
      min-height: 0;
      padding: 6px 14px;
      align-self: start;
    }
    .panel:has(.empty) .head,
    .panel.user-collapsed .head {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    .panel:has(.empty) { opacity: 0.55; }
    .panel.user-collapsed { opacity: 0.75; }
    .panel:has(.empty) .empty { display: none; }
    /* Hide body when user collapsed. Keep the .head visible. */
    .panel.user-collapsed > *:not(.head) { display: none; }

    .bucket {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      margin-right: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .bucket.overdue   { background: color-mix(in srgb, var(--red) 15%, transparent);    color: var(--red); }
    .bucket.today     { background: color-mix(in srgb, var(--cyan) 15%, transparent);   color: var(--cyan); }
    .bucket.tomorrow  { background: color-mix(in srgb, var(--purple) 15%, transparent); color: var(--purple); }
    .bucket.upcoming  { background: color-mix(in srgb, var(--purple) 15%, transparent); color: var(--purple); }
    .bucket.undated   { background: color-mix(in srgb, var(--border-strong) 40%, transparent); color: var(--text-dim); }
    .bucket.stale     { background: color-mix(in srgb, var(--yellow) 15%, transparent); color: var(--yellow); }
    .bucket.activo    { background: color-mix(in srgb, var(--green) 15%, transparent);  color: var(--green); }
    .bucket.sin-tags  { background: color-mix(in srgb, var(--yellow) 15%, transparent); color: var(--yellow); }
    .bucket.age-fresh { background: color-mix(in srgb, var(--border-strong) 40%, transparent); color: var(--text-dim); }
    .bucket.age-amber { background: color-mix(in srgb, var(--yellow) 15%, transparent); color: var(--yellow); }
    .bucket.age-stale { background: color-mix(in srgb, var(--red) 15%, transparent);    color: var(--red); }

    /* ── Reminders check-off control ──────────────────────────── */
    .rem-list li { display: flex; align-items: baseline; flex-wrap: wrap; gap: 6px; }
    .rem-check {
      background: transparent;
      border: 1px solid var(--border-strong);
      color: transparent;
      width: 16px; height: 16px;
      border-radius: 4px;
      padding: 0;
      flex-shrink: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: border-color 120ms ease, background 120ms ease, color 120ms ease;
      margin-right: 2px;
      align-self: center;
    }
    .rem-check-icon { width: 12px; height: 12px; }
    .rem-check:hover:not(:disabled) {
      border-color: var(--green);
      color: var(--green);
    }
    .rem-check:disabled { cursor: not-allowed; opacity: 0.3; }
    .rem-list li.completing .rem-check {
      border-color: var(--green);
      color: var(--green);
      background: color-mix(in srgb, var(--green) 15%, transparent);
      animation: rem-pulse 0.9s ease-in-out;
    }
    .rem-list li.completed .rem-check {
      border-color: var(--green);
      background: var(--green);
      color: var(--bg);
    }
    .rem-list li.completed b,
    .rem-list li.completed .meta {
      text-decoration: line-through;
      color: var(--text-faint);
      opacity: 0.6;
    }
    .rem-list li.complete-err .rem-check {
      border-color: var(--red);
      color: var(--red);
    }
    @keyframes rem-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }

    /* ── PageRank panel ───────────────────────────────────────── */
    .pr-list .rank {
      display: inline-block;
      min-width: 2.2em;
      color: var(--text-faint);
      font-size: 11px;
      margin-right: 4px;
    }
    .pr-bar {
      margin-top: 4px;
      height: 3px;
      background: color-mix(in srgb, var(--border) 70%, transparent);
      border-radius: 2px;
      overflow: hidden;
    }
    .pr-bar > span {
      display: block;
      height: 100%;
      background: var(--cyan);
      border-radius: 2px;
    }

    /* ── Eval-trend panel ─────────────────────────────────────── */
    .eval-list li { display: flex; align-items: baseline; gap: 8px; }
    .eval-list .baseline { color: var(--text-faint); }
    .delta {
      font-size: 11px;
      margin-left: auto;
      font-variant-numeric: tabular-nums;
    }
    .delta.up   { color: var(--green); }
    .delta.down { color: var(--red); }
    .delta.flat { color: var(--text-faint); }
    .sparkline {
      color: var(--cyan-dim);
      vertical-align: middle;
      margin-left: 6px;
    }

    /* ── Followup-aging panel ─────────────────────────────────── */
    .age-badges {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .age-badges .bucket {
      font-size: 11px;
      padding: 3px 8px;
    }

    .error {
      padding: 16px;
      background: color-mix(in srgb, var(--red) 10%, transparent);
      border: 1px solid var(--red);
      border-radius: 4px;
      color: var(--red);
      font-size: 13px;
    }

    /* ── Channel identity (family color-coding) ──────────────── */
    /* Each panel gets a 2px left accent + matching title color so the
       grid reads by source at a glance. 5 families map by panel id:
         inbox   → cyan    (things owed to you: gmail, reminders, cal, wa)
         activity→ green   (your recent actions: notes, inbox captures, vault)
         signals → yellow  (system alerts: loops, contradictions, low-conf)
         external→ purple  (outside world: chrome, bookmarks, drive)
         health  → dim     (deterministic metrics: pagerank, eval, weather, finanzas) */
    .panel {
      border-left-width: 2px;
      border-left-style: solid;
      border-left-color: var(--border);
      transition: border-left-color 120ms ease;
    }
    .panel .head h3 {
      font-size: 11.5px;
      transition: color 120ms ease;
    }

    /* inbox — cyan */
    #panel-gmail, #panel-reminders, #panel-calendar, #panel-wa-unreplied {
      border-left-color: color-mix(in srgb, var(--cyan) 70%, transparent);
    }
    #panel-gmail .head h3,
    #panel-reminders .head h3,
    #panel-calendar .head h3,
    #panel-wa-unreplied .head h3 { color: var(--cyan); }

    /* activity — green */
    #panel-activity, #panel-inbox, [id^="panel-vault-"] {
      border-left-color: color-mix(in srgb, var(--green) 70%, transparent);
    }
    #panel-activity .head h3,
    #panel-inbox .head h3,
    [id^="panel-vault-"] .head h3 { color: var(--green); }

    /* signals — yellow */
    #panel-loops, #panel-aging, #panel-contradictions, #panel-lowconf {
      border-left-color: color-mix(in srgb, var(--yellow) 70%, transparent);
    }
    #panel-loops .head h3,
    #panel-aging .head h3,
    #panel-contradictions .head h3,
    #panel-lowconf .head h3 { color: var(--yellow); }

    /* external — purple */
    #panel-chrome, #panel-bookmarks, #panel-drive {
      border-left-color: color-mix(in srgb, var(--purple) 70%, transparent);
    }
    #panel-chrome .head h3,
    #panel-bookmarks .head h3,
    #panel-drive .head h3 { color: var(--purple); }

    /* health — muted (deterministic metrics, low cognitive weight) */
    #panel-pagerank, #panel-evaltrend, #panel-weather, #panel-finance {
      border-left-color: color-mix(in srgb, var(--text-dim) 50%, transparent);
    }
    #panel-pagerank .head h3,
    #panel-evaltrend .head h3,
    #panel-weather .head h3,
    #panel-finance .head h3 { color: var(--text-dim); }

    /* Empty panels fade back so active channels pop. Min-height
       shrinks so a row of empties doesn't waste vertical space. */
    .panel:has(.empty) {
      opacity: 0.55;
      min-height: 80px;
    }
    .panel .empty {
      padding: 14px 0 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .panel .empty::before {
      content: "";
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.5px dashed color-mix(in srgb, var(--text-faint) 60%, transparent);
      display: block;
      opacity: 0.5;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      main#home { padding: 64px 12px 40px; }
      .home-head { flex-wrap: wrap; }
    }
  </style>
