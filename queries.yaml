      - question: "qué herramientas uso para grabar ese tipo de charla"
        expected:
          - 03-Resources/Coaching/Coaching - Grabacion y herramientas.md

  # Failure mode: "profundizá en X" donde X es otra nota de la misma carpeta
  # (no self-reference trivial), luego "y las versiones de Y" que también
  # está en la carpeta. Exercises folder affinity + named-entity anchoring.
  - id: musica-muros-profundiza
    turns:
      - question: "letra de muros fractales"
        expected:
