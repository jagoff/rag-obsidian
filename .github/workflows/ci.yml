name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/ruff-action@v4.0.0
        with:
          # Full project scope — previous config only lint-checked
          # rag.py/mcp_server.py and skipped web/ + scripts/
          # (~5.6k lines untouched). Added tests/ in the 2026-04-21
          # hardening pass after discovering that `make lint` (which
          # runs `uvx ruff check` unscoped) was flagging 22 F401s in
          # tests/ that CI happily ignored. The rule set stays at
          # ruff's default (E/F/W); selection rules and extend-ignore
          # live in pyproject.toml so local `ruff check` matches CI.
          src: "rag mcp_server.py web scripts tests"

  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        env:
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: uv run pytest tests/ -q --tb=short
