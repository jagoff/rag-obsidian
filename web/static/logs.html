<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover empareja con las otras páginas de la PWA. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a1f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="rag">
  <title>rag · logs</title>

  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/pwa/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/pwa/favicon-16.png">
  <link rel="apple-touch-icon" href="/static/pwa/apple-touch-icon.png">

  <script>
    // Inline theme init — corre antes del paint para evitar flash de tema.
    (function () {
      try {
        var t = localStorage.getItem("rag-theme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
      } catch (e) {}
    })();
  </script>
  <script src="/static/pwa/register-sw.js" defer></script>
  <style>
    /* Paleta heredada de status.html / dashboard. Mantener sincronizado
       si el aesthetic cambia — esa página es la "fuente" canónica. */
    :root {
      --bg: #1a1a1f;
      --bg-elev: #222228;
      --bg-card: #26262c;
      --border: #33333a;
      --border-strong: #3e3e46;
      --text: #ececed;
      --text-dim: #a0a0a6;
      --text-faint: #7a7a82;
      --green: #7ee787;
      --cyan: #79c0ff;
      --cyan-dim: #5a9bd5;
      --yellow: #e3c27a;
      --red: #ff7b72;
      --purple: #d2a8ff;
      --grid: rgba(255,255,255,0.04);
      --hover: rgba(255,255,255,0.06);
      --sep: rgba(255,255,255,0.03);
      color-scheme: dark;
    }

    :root[data-theme="light"] {
      --bg: #fafafa;
      --bg-elev: #ffffff;
      --bg-card: #ffffff;
      --border: #e2e2e5;
      --border-strong: #cfcfd4;
      --text: #1a1a20;
      --text-dim: #52525b;
      --text-faint: #70707a;
      --green: #2f8f3d;
      --cyan: #0969da;
      --cyan-dim: #0969da;
      --yellow: #a0761a;
      --red: #c8311f;
      --purple: #7c3aed;
      --grid: rgba(0,0,0,0.05);
      --hover: rgba(0,0,0,0.04);
      --sep: rgba(0,0,0,0.04);
      color-scheme: light;
    }

    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg: #fafafa;
        --bg-elev: #ffffff;
        --bg-card: #ffffff;
        --border: #e2e2e5;
        --border-strong: #cfcfd4;
        --text: #1a1a20;
        --text-dim: #52525b;
        --text-faint: #70707a;
        --green: #2f8f3d;
        --cyan: #0969da;
        --cyan-dim: #0969da;
        --yellow: #a0761a;
        --red: #c8311f;
        --purple: #7c3aed;
        --grid: rgba(0,0,0,0.05);
        --hover: rgba(0,0,0,0.04);
        --sep: rgba(0,0,0,0.04);
        color-scheme: light;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "SF Mono", "Menlo", "Monaco", "JetBrains Mono", ui-monospace, monospace;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    :focus { outline: none; }
    :focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: 2px;
      border-radius: 4px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* Header copia el patrón sticky/blur de status.html. */
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 18px;
      padding: 14px 0 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      gap: 12px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--cyan);
    }

    header h1 span { color: var(--text-faint); font-weight: 400; }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 12px;
      color: var(--text-dim);
      flex-wrap: wrap;
    }
    .header-meta a { color: var(--cyan-dim); text-decoration: none; }
    .header-meta a:hover { color: var(--cyan); }
    .header-meta button {
      background: var(--bg-elev);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .header-meta button:hover {
      background: var(--hover);
      border-color: var(--border-strong);
    }
    .header-meta button[aria-pressed="true"] {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    /* Resumen arriba: chip por status agregado. */
    .totals {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .totals .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-faint);
    }
    .totals .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      padding: 3px 9px;
      border-radius: 6px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
    }
    .totals .chip strong {
      font-weight: 700;
      font-size: 14px;
    }
    .totals .chip.error { color: var(--red); border-color: color-mix(in srgb, var(--red) 35%, var(--border)); }
    .totals .chip.warn  { color: var(--yellow); border-color: color-mix(in srgb, var(--yellow) 35%, var(--border)); }
    .totals .chip.ok    { color: var(--green); border-color: color-mix(in srgb, var(--green) 35%, var(--border)); }
    .totals .chip.dim   { color: var(--text-dim); }

    /* Layout: sidebar (lista de services) + viewer (tail). En desktop
       las 2 columnas; en mobile la sidebar arriba colapsable. */
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 14px;
      min-height: 70vh;
    }
    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
    }

    .sidebar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .sidebar-search {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .sidebar-search input {
      flex: 1;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 6px;
    }
    .sidebar-search input:focus {
      border-color: var(--cyan);
      outline: none;
    }
    .sidebar-filter-group {
      display: inline-flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sidebar-filter-btn {
      background: transparent;
      color: var(--text-dim);
      border: none;
      padding: 5px 8px;
      font-family: inherit;
      font-size: 10.5px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      min-width: 28px;
    }
    .sidebar-filter-btn + .sidebar-filter-btn {
      border-left: 1px solid var(--border);
    }
    .sidebar-filter-btn:hover { background: var(--hover); }
    .sidebar-filter-btn.is-active {
      background: color-mix(in srgb, var(--cyan) 18%, transparent);
      color: var(--cyan);
      font-weight: 600;
    }

    .service-group-label {
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-faint);
      margin-top: 8px;
      padding: 0 4px;
    }
    .service-group-label:first-of-type { margin-top: 0; }

    .service-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .service-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 7px 10px;
      border-radius: 7px;
      cursor: pointer;
      border: 1px solid transparent;
      border-left: 3px solid var(--border-strong);
      background: var(--sep);
      transition: background 0.12s;
      min-width: 0;
    }
    .service-item:hover { background: var(--hover); }
    .service-item.is-selected {
      background: color-mix(in srgb, var(--cyan) 14%, transparent);
      border-color: var(--cyan);
      border-left-color: var(--cyan);
    }
    .service-item.status-ok    { border-left-color: var(--green); }
    .service-item.status-warn  { border-left-color: var(--yellow); }
    .service-item.status-error { border-left-color: var(--red); }
    .service-item.status-empty { opacity: 0.55; }

    .service-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-faint);
      flex-shrink: 0;
    }
    .service-item.status-ok .service-dot    { background: var(--green); }
    .service-item.status-warn .service-dot  { background: var(--yellow); }
    .service-item.status-error .service-dot {
      background: var(--red);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.65; transform: scale(1.15); }
    }
    @media (prefers-reduced-motion: reduce) {
      .service-item.status-error .service-dot { animation: none; }
    }

    .service-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-width: 0;
    }
    .service-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .service-meta {
      font-size: 10px;
      color: var(--text-faint);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-variant-numeric: tabular-nums;
    }

    .service-badge {
      font-size: 10px;
      font-weight: 700;
      color: var(--red);
      font-variant-numeric: tabular-nums;
      padding: 1px 6px;
      border-radius: 3px;
      background: color-mix(in srgb, var(--red) 16%, transparent);
      flex-shrink: 0;
    }
    .service-badge.warn {
      color: var(--yellow);
      background: color-mix(in srgb, var(--yellow) 16%, transparent);
    }

    /* Viewer */
    .viewer {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      min-height: 400px;
      max-height: 80vh;
    }

    .viewer-head {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--sep);
      flex-wrap: wrap;
    }
    .viewer-title {
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-width: 0;
      flex: 1;
    }
    .viewer-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      font-family: "SF Mono", "Menlo", monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .viewer-sub {
      font-size: 10.5px;
      color: var(--text-faint);
      font-variant-numeric: tabular-nums;
    }
    .viewer-tabs {
      display: inline-flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .viewer-tab {
      background: transparent;
      color: var(--text-dim);
      border: none;
      padding: 5px 10px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .viewer-tab + .viewer-tab { border-left: 1px solid var(--border); }
    .viewer-tab:hover { background: var(--hover); }
    .viewer-tab.is-active {
      background: color-mix(in srgb, var(--cyan) 18%, transparent);
      color: var(--cyan);
      font-weight: 600;
    }
    .viewer-tab .tab-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 5px;
      background: color-mix(in srgb, var(--red) 24%, transparent);
      color: var(--red);
      font-variant-numeric: tabular-nums;
    }
    .viewer-tab.is-active .tab-badge {
      background: color-mix(in srgb, var(--red) 30%, transparent);
    }

    .viewer-controls {
      display: flex;
      gap: 8px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--sep);
      flex-wrap: wrap;
      align-items: center;
      font-size: 11px;
    }
    .viewer-controls input[type="search"] {
      flex: 1;
      min-width: 140px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 11.5px;
      padding: 5px 8px;
      border-radius: 6px;
    }
    .viewer-controls input[type="search"]:focus { border-color: var(--cyan); outline: none; }
    .viewer-controls .ctrl-toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 9px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-elev);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
    }
    .viewer-controls .ctrl-toggle:hover {
      background: var(--hover);
      border-color: var(--border-strong);
    }
    .viewer-controls .ctrl-toggle[aria-pressed="true"] {
      border-color: var(--yellow);
      color: var(--yellow);
      background: color-mix(in srgb, var(--yellow) 12%, transparent);
    }

    .viewer-counts {
      font-size: 10.5px;
      color: var(--text-faint);
      font-variant-numeric: tabular-nums;
    }
    .viewer-counts .c-error { color: var(--red); }
    .viewer-counts .c-warn  { color: var(--yellow); }
    .viewer-counts .c-ok    { color: var(--green); }

    .viewer-body {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
      font-family: "SF Mono", "Menlo", monospace;
      font-size: 11.5px;
      background: var(--bg);
    }

    .log-line {
      display: grid;
      grid-template-columns: 50px 60px 1fr;
      gap: 10px;
      padding: 1px 14px;
      align-items: baseline;
      white-space: pre-wrap;
      word-break: break-word;
      font-variant-numeric: tabular-nums;
      border-left: 2px solid transparent;
    }
    .log-line:hover { background: var(--hover); }
    .log-line .lnum {
      color: var(--text-faint);
      font-size: 10px;
      text-align: right;
    }
    .log-line .lvl {
      font-size: 9.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--bg-elev);
      color: var(--text-dim);
      text-align: center;
      align-self: center;
    }
    .log-line .text {
      color: var(--text);
      font-size: 11.5px;
    }

    /* Coloreo por level. La clave es que la línea entera se diferencie
       sin que el "info" baseline distraiga del trabajo serio. */
    .log-line.lvl-error {
      border-left-color: var(--red);
      background: color-mix(in srgb, var(--red) 6%, transparent);
    }
    .log-line.lvl-error .lvl { color: var(--red); background: color-mix(in srgb, var(--red) 18%, transparent); }
    .log-line.lvl-error .text { color: var(--red); }

    .log-line.lvl-warn {
      border-left-color: var(--yellow);
    }
    .log-line.lvl-warn .lvl { color: var(--yellow); background: color-mix(in srgb, var(--yellow) 18%, transparent); }
    .log-line.lvl-warn .text { color: var(--yellow); }

    .log-line.lvl-ok .lvl { color: var(--green); background: color-mix(in srgb, var(--green) 14%, transparent); }
    .log-line.lvl-info .lvl { color: var(--text-faint); }

    /* Highlight para matches del filtro de búsqueda. */
    .log-line .text mark {
      background: color-mix(in srgb, var(--cyan) 30%, transparent);
      color: inherit;
      padding: 0 2px;
      border-radius: 2px;
    }

    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
    }
    .empty-state .small {
      font-size: 11px;
      color: var(--text-faint);
      margin-top: 6px;
    }

    .loading {
      text-align: center;
      padding: 40px 0;
      color: var(--text-dim);
    }
    .loading::after { content: "▍"; }
    @media (prefers-reduced-motion: no-preference) {
      .loading::after { animation: blink 1s steps(2) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
    }

    .error-banner {
      background: color-mix(in srgb, var(--red) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--red) 40%, transparent);
      color: var(--red);
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 14px;
      font-size: 12px;
    }

    /* Mobile: stack vertical, sidebar como dropdown comprimido. */
    @media (max-width: 800px) {
      .container { padding: 16px 12px 40px; }
      header h1 { font-size: 16px; }
      .sidebar { max-height: 40vh; }
      .viewer { max-height: none; }
      .log-line { grid-template-columns: 38px 50px 1fr; gap: 6px; padding: 1px 8px; }
      .log-line .text { font-size: 11px; }
    }

    /* a11y: skip-link visible al recibir foco. */
    .skip-link {
      position: absolute;
      top: 0;
      left: 0;
      padding: 8px 12px;
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--cyan);
      border-radius: 4px;
      text-decoration: none;
      font-size: 13px;
      transform: translateY(-200%);
      z-index: 10000;
      transition: transform 120ms ease-out;
    }
    .skip-link:focus,
    .skip-link:focus-visible {
      transform: translateY(0);
      outline: 2px solid var(--text);
      outline-offset: 2px;
    }
    main:focus, main:focus-visible { outline: none; }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Saltar al contenido</a>
  <div class="container">
    <header>
      <h1>rag <span>· logs</span></h1>
      <div class="header-meta">
        <span id="meta-updated" aria-live="polite" aria-atomic="true">cargando…</span>
        <button id="live-toggle" type="button" aria-pressed="true"
                aria-label="Pausar o reanudar auto-refresh">
          <span id="live-label">auto ON</span>
        </button>
        <button id="refresh-now" type="button" aria-label="Refrescar ahora">↻</button>
        <button id="theme-toggle" type="button" aria-label="Alternar tema claro/oscuro">
          <span id="theme-icon" aria-hidden="true">◐</span>
        </button>
        <a href="/">home</a>
        <a href="/chat">chat</a>
        <a href="/dashboard">dashboard</a>
        <a href="/status">status</a>
        <a href="/learning">learning</a>
      </div>
    </header>

    <main id="main" tabindex="-1">
      <div class="totals" id="totals" aria-label="Resumen de logs">
        <span class="label">resumen</span>
        <span class="chip dim"><strong id="total-services">—</strong> services</span>
        <span class="chip error"><strong id="total-error">0</strong> con errores</span>
        <span class="chip warn"><strong id="total-warn">0</strong> con warnings</span>
        <span class="chip ok"><strong id="total-ok">0</strong> ok</span>
      </div>

      <div id="error-banner-host"></div>

      <div class="layout">
        <aside class="sidebar" aria-label="Lista de logs por servicio">
          <div class="sidebar-search">
            <input id="search-services" type="search" placeholder="buscar service…"
                   aria-label="Buscar service" autocomplete="off">
            <div class="sidebar-filter-group" role="radiogroup" aria-label="Filtro de status">
              <button type="button" class="sidebar-filter-btn is-active"
                      data-filter="all" aria-pressed="true">todos</button>
              <button type="button" class="sidebar-filter-btn"
                      data-filter="error" aria-pressed="false">err</button>
              <button type="button" class="sidebar-filter-btn"
                      data-filter="warn" aria-pressed="false">warn</button>
            </div>
          </div>
          <div class="service-list" id="service-list">
            <div class="loading">cargando services</div>
          </div>
        </aside>

        <section class="viewer" aria-label="Visor del log seleccionado">
          <div class="viewer-head">
            <div class="viewer-title">
              <div class="viewer-name" id="viewer-name">— elegí un service —</div>
              <div class="viewer-sub" id="viewer-sub"></div>
            </div>
            <div class="viewer-tabs" id="viewer-tabs" role="tablist" aria-label="Stdout vs stderr"></div>
          </div>

          <div class="viewer-controls" id="viewer-controls" hidden>
            <input id="viewer-search" type="search" placeholder="filtrar líneas (substring)…"
                   aria-label="Filtrar líneas">
            <button type="button" class="ctrl-toggle" id="viewer-only-errors"
                    aria-pressed="false">sólo warn/error</button>

          </div>

          <div class="viewer-body" id="viewer-body">
            <div class="empty-state">
              elegí un service del listado
              <div class="small">los services con errores recientes están arriba, marcados en rojo</div>
            </div>
          </div>
        </section>
      </div>
    </main>
