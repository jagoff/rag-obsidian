        expected:
          - 03-Resources/Claude/Claude Code - Comandos CLI.md
      - question: "y los interactivos"
        expected:
          - 03-Resources/Claude/Claude Code - Comandos Interactivos.md

  - id: rag-system
    turns:
      - question: "qué modelo de embeddings uso"
        expected:
