# Multi-turn chains: each chain is an independent conversation where later
# turns may contain pronouns or ellipsis that only resolve against the
# prior user/assistant exchange. Eval builds `history` progressively per
# chain; from turn 2 onward, `reformulate_query` rewrites the question as
# a standalone query before retrieve.
chains:
  - id: coaching-ikigai
    turns:
      - question: "qué es ikigai"
        expected:
          - 02-Areas/Coaching/Ikigai.md
      - question: "profundizá en el concepto"
        expected:
          - 02-Areas/Coaching/Ikigai.md
      - question: "y cómo se relaciona eso con mi perfil de coach"
        expected:
          - 02-Areas/Coaching/Fer coach - Bio.md
          - 02-Areas/Coaching/Fer Coach.md

  - id: coaching-liderazgo
    turns:
      - question: "curso de liderazgo estratégico"
        expected:
          - 02-Areas/Coaching/Coaching - Curso de liderazgo estratégico.md
      - question: "y el otro curso que tenía"
        expected:
          - 02-Areas/Coaching/Coaching - Curso de liderazgo.md
      - question: "quiénes son mis referentes en esto"
        expected:
          - 02-Areas/Coaching/Coaching - Referentes.md

  - id: musica-muros-fractales
    turns:
      - question: "letra de muros fractales"
        expected:
