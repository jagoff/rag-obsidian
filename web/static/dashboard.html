  <script>
    // Inline theme init — runs before body paint to avoid flash.
    (function () {
      try {
        var t = localStorage.getItem("rag-theme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
      } catch (e) {}
    })();
  </script>
  <script src="/static/pwa/register-sw.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
  <style>
    :root {
      --bg: #1a1a1f;
      --bg-elev: #222228;
      --bg-card: #26262c;
      --border: #33333a;
      --border-strong: #3e3e46;
      --text: #ececed;
      --text-dim: #a0a0a6;
      --text-faint: #7a7a82;
      --green: #7ee787;
      --cyan: #79c0ff;
      --cyan-dim: #5a9bd5;
      --yellow: #e3c27a;
      --red: #ff7b72;
      --purple: #d2a8ff;
      --orange: #ffa657;
      --pink: #f778ba;
      --grid: rgba(255,255,255,0.04);
      --hover: rgba(255,255,255,0.06);
      --sep: rgba(255,255,255,0.03);
      color-scheme: dark;
    }

    :root[data-theme="light"] {
      --bg: #fafafa;
      --bg-elev: #ffffff;
      --bg-card: #ffffff;
      --border: #e2e2e5;
      --border-strong: #cfcfd4;
      --text: #1a1a20;
      --text-dim: #52525b;
      --text-faint: #70707a;
      --green: #2f8f3d;
      --cyan: #0969da;
      --cyan-dim: #0969da;
      --yellow: #a0761a;
      --red: #c8311f;
      --purple: #7c3aed;
      --orange: #c25a11;
      --pink: #d02a8a;
      --grid: rgba(0,0,0,0.05);
      --hover: rgba(0,0,0,0.04);
      --sep: rgba(0,0,0,0.04);
      color-scheme: light;
    }

    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg: #fafafa;
        --bg-elev: #ffffff;
        --bg-card: #ffffff;
        --border: #e2e2e5;
        --border-strong: #cfcfd4;
        --text: #1a1a20;
        --text-dim: #52525b;
        --text-faint: #70707a;
        --green: #2f8f3d;
        --cyan: #0969da;
        --cyan-dim: #0969da;
        --yellow: #a0761a;
        --red: #c8311f;
        --purple: #7c3aed;
        --orange: #c25a11;
        --pink: #d02a8a;
        --grid: rgba(0,0,0,0.05);
        --hover: rgba(0,0,0,0.04);
        --sep: rgba(0,0,0,0.04);
        color-scheme: light;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      /* Defensa en profundidad: cualquier child que se overflow horizontal
         se clipea acá en lugar de hacer al body más ancho que el viewport.
         Bug histórico (2026-04-24): un <caption class="sr-only"> con
         scrollWidth=771 forzaba al body a 700px en viewport de 375px,
         rompiendo el layout responsive entero. */
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "SF Mono", "Menlo", "Monaco", "JetBrains Mono", ui-monospace, monospace;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    :focus { outline: none; }
    :focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: 2px;
      border-radius: 4px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* Header */
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      /* Permite que h1 + header-meta wrappeen a 2 líneas en mobile en
         lugar de superponerse. Sin esto, en viewports angostos los
         elementos del meta (picker de días, live toggle, etc.) se
         empujan por afuera del viewport. */
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-bottom: 28px;
      padding: 14px 0 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--cyan);
    }

    header h1 span { color: var(--text-faint); font-weight: 400; }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .header-meta a {
      color: var(--cyan-dim);
      text-decoration: none;
    }
    .header-meta a:hover { color: var(--cyan); }

    select {
      background: var(--bg-elev);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 24px 4px 8px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23888' d='M0 0l5 6 5-6z'/></svg>");
      background-repeat: no-repeat;
      background-position: right 8px center;
    }

    /* KPI cards */
    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .kpi {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .kpi-label {
      font-size: 11px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }

    .kpi-sub {
      font-size: 11px;
      color: var(--text-dim);
    }

    .kpi-value.green { color: var(--green); }
    .kpi-value.cyan { color: var(--cyan); }
    .kpi-value.yellow { color: var(--yellow); }
    .kpi-value.red { color: var(--red); }
    .kpi-value.purple { color: var(--purple); }
    .kpi-value.orange { color: var(--orange); }

    /* Signals panel (2026-04-22) — implicit events al ranker-vivo */
    .signals-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 16px;
    }
    .signals-panel h3 {
      font-size: 13px;
      color: var(--text);
      margin: 0 0 10px 0;
      font-weight: 600;
    }
    .signals-window {
      font-size: 11px;
      color: var(--text-faint);
      font-weight: 400;
      margin-left: 6px;
    }
    .signals-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      align-items: baseline;
    }
    .signal-cell {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1px;
      padding: 2px 0;
      min-width: 64px;
    }
    .signal-label {
      font-size: 10px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .signal-value {
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }
    .signal-value.green  { color: var(--green); }
    .signal-value.cyan   { color: var(--cyan); }
    .signal-value.yellow { color: var(--yellow); }
    .signal-value.red    { color: var(--red); }
    .signal-sub {
      font-size: 10px;
      color: var(--text-faint);
      font-variant-numeric: tabular-nums;
    }
    .signals-empty {
      color: var(--text-faint);
      font-size: 12px;
      padding: 4px 0;
    }

    /* Chart grid */
    .charts {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }

    .chart-card.wide {
      grid-column: 1 / -1;
    }

    /* Word cloud (chat keywords) — font-size scales with log(count) */
    .kw-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      align-content: flex-start;
      padding: 8px 2px;
      min-height: 180px;
      max-height: 320px;
      overflow: hidden;
      line-height: 1.35;
    }
    .kw-cloud .kw {
      font-family: var(--mono, ui-monospace, SFMono-Regular, Menlo, Monaco, monospace);
      color: var(--text-dim);
      font-weight: 500;
      letter-spacing: -0.01em;
      transition: color 120ms;
      cursor: default;
    }
    .kw-cloud .kw:hover { color: var(--cyan); }
    .kw-cloud .kw.t1 { font-size: 11px; color: var(--text-faint); }
    .kw-cloud .kw.t2 { font-size: 13px; }
    .kw-cloud .kw.t3 { font-size: 16px; color: var(--text); }
    .kw-cloud .kw.t4 { font-size: 20px; color: var(--cyan-dim); font-weight: 600; }
    .kw-cloud .kw.t5 { font-size: 26px; color: var(--cyan); font-weight: 700; }
    .kw-cloud-empty {
      color: var(--text-faint);
      font-size: 12px;
      padding: 24px 4px;
    }

    /* ── Memory card ────────────────────────────────────────────── */
    .memcard-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 240px;
      gap: 22px;
    }
    .memcard-main { min-width: 0; }
    .memcard-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 12px;
    }
    .memcard-total {
      font-size: 22px;
      font-weight: 700;
      color: var(--cyan);
      font-variant-numeric: tabular-nums;
    }
    .memcard-total .unit {
      font-size: 11px;
      color: var(--text-faint);
      font-weight: 400;
      margin-left: 3px;
    }
    .memcard-delta {
      font-size: 11px;
      margin-left: 10px;
      font-variant-numeric: tabular-nums;
    }
    .memcard-delta.up   { color: var(--red); }
    .memcard-delta.down { color: var(--green); }
    .memcard-delta.flat { color: var(--text-faint); }
    .memcard-window { display: flex; gap: 4px; }
    .memcard-window button {
      background: transparent;
      color: var(--text-faint);
      border: 1px solid var(--border);
      padding: 3px 10px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      border-radius: 4px;
    }
    .memcard-window button:hover { color: var(--text); }
    .memcard-window button.active {
      color: var(--cyan);
      border-color: var(--cyan);
    }
    .memcard-chart-wrap {
      position: relative;
      width: 100%;
      height: 240px;
    }
    .memcard-chart-wrap canvas { width: 100% !important; height: 100% !important; }
    .memcard-top { font-size: 12px; min-width: 0; }
    .memcard-top h3 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-dim);
      margin-bottom: 10px;
    }
    .memcard-top ul { list-style: none; }
    .memcard-top li {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px dashed color-mix(in srgb, var(--border) 60%, transparent);
      color: var(--text);
    }
    .memcard-top li:last-child { border-bottom: none; }
    .memcard-top li .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .memcard-top li .val {
      color: var(--text-faint);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .memcard-top li.warn .name { color: var(--yellow); }
    .memcard-top li.warn .val  { color: var(--yellow); font-weight: 600; }
    .memcard-top li.hot  .name { color: var(--red); }
    .memcard-top li.hot  .val  { color: var(--red); font-weight: 700; }
    .memcard-top li.hot  .name::before {
      content: "● ";
      font-size: 10px;
      vertical-align: middle;
    }
    @media (max-width: 900px) {
      .memcard-grid { grid-template-columns: 1fr; }
    }

    .chart-card h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .chart-wrap {
      position: relative;
      width: 100%;
      min-height: 180px;
    }

    .chart-wrap canvas {
      width: 100% !important;
    }

    .chart-empty {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 6px;
      color: var(--text-faint);
      font-size: 12px;
      pointer-events: none;
      background: color-mix(in srgb, var(--bg-card) 85%, transparent);
    }
    .chart-wrap[data-empty="true"] .chart-empty { display: flex; }
    .chart-wrap[data-empty="true"] canvas { opacity: 0.2; }

    /* SVG icon defaults */
    .icon { display: inline-block; vertical-align: -2px; flex-shrink: 0; }
    .tag-icon { display: inline-flex; align-items: center; margin-right: 4px; gap: 3px; }
    @media (prefers-reduced-motion: no-preference) {
      .icon.spin { animation: icon-spin 1.2s linear infinite; transform-origin: center; }
      @keyframes icon-spin { to { transform: rotate(360deg); } }
    }

    /* Verdict issues list */
    .verdict-issues {
      list-style: none;
      padding: 10px 0 0;
      margin: 0;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .verdict-issues li {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
    }

    /* Legend dots */
    .legend { margin-top: 16px; font-size: 11px; color: var(--text-faint); line-height: 1.7; }
    .legend > div { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 0%, var(--bg-elev) 50%, var(--bg-card) 100%);
      background-size: 200% 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    @media (prefers-reduced-motion: no-preference) {
      .skeleton { animation: shimmer 1.8s linear infinite; }
      @keyframes shimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
    }
    .skel-kpis {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .skel-kpi { height: 88px; }
    .skel-ticker { height: 230px; margin-bottom: 16px; }
    .skel-health {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .skel-health-card { height: 200px; }
    .skel-charts { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .skel-chart { height: 260px; }
    .skel-chart.wide { grid-column: 1 / -1; }

    /* Stats table */
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .stats-table th {
      text-align: left;
      color: var(--text-faint);
      font-weight: 600;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
    }

    .stats-table td {
      padding: 5px 10px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
    }

    .stats-table td:last-child {
      text-align: right;
      font-weight: 600;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .stats-table tr:last-child td { border-bottom: none; }

    /* Health section */
    .health {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .health-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
    }

    .health-card h3 {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }

    .health-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
      font-size: 12px;
      border-bottom: 1px solid var(--sep);
    }
    .health-row:last-child { border-bottom: none; }

    .health-label { color: var(--text-dim); }

    .health-value { font-weight: 700; font-variant-numeric: tabular-nums; }
    .health-value.good { color: var(--green); }
    .health-value.warn { color: var(--yellow); }
    .health-value.bad  { color: var(--red); }

    .health-bar {
      display: flex;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
      gap: 2px;
    }
    .health-bar > div { border-radius: 3px; }

    .health-verdict {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .health-verdict.ok  { background: color-mix(in srgb, var(--green) 12%, transparent); color: var(--green); border: 1px solid color-mix(in srgb, var(--green) 25%, transparent); }
    .health-verdict.mid { background: color-mix(in srgb, var(--yellow) 12%, transparent); color: var(--yellow); border: 1px solid color-mix(in srgb, var(--yellow) 25%, transparent); }
    .health-verdict.bad { background: color-mix(in srgb, var(--red) 12%, transparent); color: var(--red); border: 1px solid color-mix(in srgb, var(--red) 25%, transparent); }

    /* Tune history */
    .tune-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .tune-row:last-child { border-bottom: none; }
    .tune-date { color: var(--text-faint); width: 90px; }
    .tune-metric { color: var(--cyan); }
    .tune-delta { color: var(--green); }

    /* Live indicator */
    .live {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-faint);
      cursor: pointer;
      user-select: none;
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
    }
    .live:hover { border-color: var(--border-strong); }
    .live .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-faint);
      box-shadow: 0 0 0 0 rgba(126,231,135,0);
    }
    .live[data-state="live"] .dot {
      background: var(--green);
    }
    .live[data-state="paused"] .dot { background: var(--yellow); }
    .live[data-state="off"] .dot { background: var(--red); }
    @media (prefers-reduced-motion: no-preference) {
      .live[data-state="live"] .dot { animation: pulse 1.6s ease-out infinite; }
      @keyframes pulse {
        0%   { box-shadow: 0 0 0 0 color-mix(in srgb, var(--green) 55%, transparent); }
        70%  { box-shadow: 0 0 0 7px color-mix(in srgb, var(--green) 0%, transparent); }
        100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--green) 0%, transparent); }
      }
    }

    /* Live ticker */
    .ticker {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .ticker-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .ticker-head h2 {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .ticker-empty { color: var(--text-faint); padding: 8px 0; font-size: 12px; }
    .ticker-list { display: flex; flex-direction: column; gap: 4px; max-height: 180px; overflow-y: auto; }
    .ticker-item {
      display: grid;
      grid-template-columns: 60px 70px 1fr 60px 60px;
      gap: 10px;
      align-items: center;
      padding: 4px 6px;
      border-radius: 4px;
      font-size: 12px;
    }
    .ticker-item:hover { background: var(--hover); }
    @media (prefers-reduced-motion: no-preference) {
      .ticker-item { animation: slideIn 0.4s ease-out; }
    }
    .ticker-item .t-time { color: var(--text-faint); font-variant-numeric: tabular-nums; font-size: 11px; }
    .ticker-item .t-source {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 600;
    }
    .ticker-item .t-source.whatsapp { background: color-mix(in srgb, var(--green) 15%, transparent); color: var(--green); }
    .ticker-item .t-source.web { background: color-mix(in srgb, var(--cyan) 15%, transparent); color: var(--cyan); }
    .ticker-item .t-source.cli { background: color-mix(in srgb, var(--purple) 15%, transparent); color: var(--purple); }
    .ticker-item .t-source.legacy { background: color-mix(in srgb, var(--orange) 15%, transparent); color: var(--orange); }
    .ticker-item .t-source.feedback { background: color-mix(in srgb, var(--pink) 15%, transparent); color: var(--pink); }
    .ticker-item .t-q { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ticker-item .t-score { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
    .ticker-item .t-score.high { color: var(--green); }
    .ticker-item .t-score.mid  { color: var(--yellow); }
    .ticker-item .t-score.low  { color: var(--red); }
    .ticker-item .t-latency { text-align: right; color: var(--text-dim); font-variant-numeric: tabular-nums; font-size: 11px; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Feedback section */
    .feedback-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .fb-list { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }
    .fb-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 8px 10px;
      background: var(--sep);
      border-radius: 6px;
      font-size: 12px;
      border-left: 2px solid var(--border-strong);
    }
    .fb-row.pos { border-left-color: var(--green); }
    .fb-row.neg { border-left-color: var(--red); }
    .fb-row.miss { border-left-color: var(--orange); }
    .fb-path { color: var(--cyan); font-size: 11px; word-break: break-all; }
    .fb-meta { color: var(--text-faint); font-size: 11px; margin-top: 2px; }
    .fb-q { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fb-count {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--red);
      align-self: center;
    }
    .fb-count.pos { color: var(--green); }
    .fb-empty {
      color: var(--text-faint);
      text-align: center;
      padding: 30px 0;
      font-size: 12px;
    }
    .fb-cal {
      display: flex;
      gap: 16px;
      padding: 10px 0;
      margin-top: 10px;
      border-top: 1px solid var(--border);
    }
    .fb-cal-item { display: flex; flex-direction: column; gap: 2px; }
    .fb-cal-label { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.04em; }
    .fb-cal-value { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .fb-cal-value.bad { color: var(--red); }
    .fb-cal-value.warn { color: var(--yellow); }
    .fb-cal-value.good { color: var(--green); }

    /* Screen-reader only */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* ── a11y: skip-link + tap targets (audit LOTE 4) ────────────────
       dashboard.html no incluye style.css, así que el bloque global de
       a11y que L1 agregó al CSS compartido NO aplica acá. Re-implementa-
       mos lo mínimo inline: skip-link visible al recibir foco, y
       min-height 44px para botones cuando el puntero es coarse (touch)
       o el viewport es <= 640px (mobile). Las "chips" de ventana de
       tiempo (.memcard-window button) están en la lista por default;
       en desktop quedan compactas como antes (3px 10px).
    */
    .skip-link {
      position: absolute;
      top: 0;
      left: 0;
      background: var(--cyan);
      color: var(--bg);
      padding: 8px 14px;
      border-radius: 0 0 8px 0;
      font-weight: 700;
      font-size: 13px;
      text-decoration: none;
      z-index: 9999;
      transform: translateY(-110%);
      transition: transform 120ms ease-out;
    }
    .skip-link:focus,
    .skip-link:focus-visible {
      transform: translateY(0);
      outline: 2px solid var(--text);
      outline-offset: 2px;
    }
    /* Main landmark con tabindex=-1 no debe mostrar outline al recibir
       foco programático desde el skip-link (no es interactivo). */
    main:focus,
    main:focus-visible {
      outline: none;
    }
    @media (pointer: coarse), (max-width: 640px) {
      header button,
      .memcard-window button {
        min-height: 44px;
      }
    }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 120px 0;
      color: var(--text-dim);
      opacity: 0.85;
    }

    .loading::after {
      content: "▍";
    }
    @media (prefers-reduced-motion: no-preference) {
      .loading::after { animation: blink 1s steps(2) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
    }

    /* Responsive */
    @media (max-width: 900px) {
      .charts { grid-template-columns: 1fr; }
      .chart-card.wide { grid-column: 1; }
      .kpis { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      .feedback-grid { grid-template-columns: 1fr; }
      .ticker-item { grid-template-columns: 50px 60px 1fr 50px; }
      .ticker-item .t-latency { display: none; }
    }
    /* Mobile: header-meta wrappea + chip-style. h1 más chico (16px vs
       18px) para dejar lugar al meta sin que se rompa. Date picker
       toma ancho fijo más chico; live-toggle compacta el dot+label. */
    @media (max-width: 640px) {
      header {
        gap: 6px 10px;
      }
      header h1 { font-size: 16px; }
      .header-meta {
        gap: 8px;
        flex-wrap: wrap;
      }
      .header-meta select {
        font-size: 13px;
        padding: 4px 22px 4px 6px;
      }
      .container { padding: 16px 14px 40px; }
    }

    /* ── WhatsApp scheduled messages section ────────────────────────────
       Tabs simples + tabla semántica + popover inline para reprogramar.
       En mobile (<=640px) la tabla colapsa a cards via `data-label` en
       cada `<td>` (el patrón "responsive table sin JS"). Sin libs.
    */
    .wa-pending-badge {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-faint);
      margin-left: 6px;
    }
    .wa-tabs {
      display: flex;
      gap: 4px;
      margin: 12px 0 10px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .wa-tab {
      background: transparent;
      border: 0;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 12px;
      padding: 8px 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color 120ms, border-color 120ms;
    }
    .wa-tab:hover { color: var(--text); }
    .wa-tab.active {
      color: var(--text);
      border-bottom-color: var(--cyan);
    }
    .wa-tab[aria-selected="true"] { color: var(--text); border-bottom-color: var(--cyan); }
    .wa-tab-count {
      font-size: 10px;
      color: var(--text-faint);
      background: var(--sep);
      padding: 1px 6px;
      border-radius: 10px;
      font-variant-numeric: tabular-nums;
    }
    .wa-tab.active .wa-tab-count,
    .wa-tab[aria-selected="true"] .wa-tab-count {
      color: var(--cyan);
      background: rgba(121, 192, 255, 0.12);
    }
    .wa-tab:focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: -2px;
      border-radius: 4px 4px 0 0;
    }

    .wa-scheduled-body {
      min-height: 60px;
    }
    .wa-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .wa-table th,
    .wa-table td {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid var(--sep);
      vertical-align: top;
    }
    .wa-table th {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-faint);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    .wa-table tbody tr:hover { background: var(--hover); }
    .wa-table tbody tr:last-child td { border-bottom: 0; }
    .wa-who {
      color: var(--cyan);
      text-decoration: none;
      border-bottom: 1px dotted currentColor;
      font-variant-numeric: tabular-nums;
    }
    a.wa-who:hover { color: var(--text); }
    .wa-msg {
      color: var(--text-dim);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .wa-when {
      color: var(--text);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .wa-chip {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 600;
      background: var(--sep);
      color: var(--text-faint);
      border: 1px solid transparent;
    }
    .wa-chip-pending {
      color: var(--text-faint);
      background: var(--sep);
    }
    .wa-chip-sent {
      color: var(--green);
      background: rgba(126, 231, 135, 0.1);
      border-color: rgba(126, 231, 135, 0.25);
    }
    .wa-chip-sent-late {
      color: var(--orange);
      background: rgba(255, 166, 87, 0.1);
      border-color: rgba(255, 166, 87, 0.3);
      cursor: help;
    }
    .wa-chip-failed {
      color: var(--red);
      background: rgba(255, 123, 114, 0.1);
      border-color: rgba(255, 123, 114, 0.3);
      cursor: help;
    }
    .wa-chip-cancelled {
      color: var(--text-faint);
      background: var(--sep);
      opacity: 0.55;
    }

    .wa-actions {
      white-space: nowrap;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .wa-action-empty { color: var(--text-faint); font-size: 11px; }
    .wa-btn,
    .wa-btn-link,
    .wa-chip-quick {
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      border-radius: 4px;
      padding: 4px 10px;
      transition: background 120ms, color 120ms, border-color 120ms;
    }
    .wa-btn {
      background: transparent;
      border: 1px solid var(--border-strong);
      color: var(--text);
    }
    .wa-btn:hover { background: var(--hover); }
    .wa-btn-cancel {
      color: var(--red);
      border-color: rgba(255, 123, 114, 0.4);
    }
    .wa-btn-cancel:hover {
      background: rgba(255, 123, 114, 0.1);
      border-color: var(--red);
    }
    .wa-btn-confirm {
      color: var(--green);
      border-color: rgba(126, 231, 135, 0.4);
    }
    .wa-btn-confirm:hover {
      background: rgba(126, 231, 135, 0.1);
      border-color: var(--green);
    }
    .wa-btn-link {
      background: transparent;
      border: 0;
      color: var(--cyan);
      padding: 4px 6px;
      text-decoration: none;
      border-bottom: 1px dotted transparent;
    }
    .wa-btn-link:hover {
      border-bottom-color: var(--cyan);
    }
    .wa-btn:focus-visible,
    .wa-btn-link:focus-visible,
    .wa-chip-quick:focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: 1px;
    }
    .wa-btn[disabled],
    .wa-btn-link[disabled] {
      opacity: 0.55;
      cursor: not-allowed;
    }

    /* Reschedule popover — vive en un <tr> que se appendea después del
       row target. `colspan="5"` ocupa todo el ancho de la tabla. */
    .wa-resched-row td {
      background: var(--bg-elev);
      border-bottom: 1px solid var(--border) !important;
    }
    .wa-resched {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      padding: 4px 0;
    }
    .wa-resched-label {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      color: var(--text-dim);
    }
    .wa-resched-input {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      padding: 5px 8px;
      font-family: inherit;
      font-size: 12px;
    }
    .wa-resched-input:focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: 1px;
    }
    .wa-resched-chips {
      display: inline-flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .wa-chip-quick {
      background: var(--sep);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
    }
    .wa-chip-quick:hover {
      color: var(--cyan);
      border-color: var(--cyan);
    }
    .wa-resched-actions {
      display: inline-flex;
      gap: 6px;
      margin-left: auto;
    }
    .wa-resched-error {
      flex-basis: 100%;
      color: var(--red);
      font-size: 11px;
    }

    /* Mobile: la tabla colapsa a cards. Ocultamos thead, cada <tr> se
       comporta como un card, y cada <td> usa data-label como prefix
       (label : valor en una fila flex). */
    @media (max-width: 640px) {
      .wa-table thead { display: none; }
      .wa-table,
      .wa-table tbody,
      .wa-table tr,
      .wa-table td { display: block; width: 100%; }
      .wa-table tr {
        border: 1px solid var(--border);
        border-radius: 6px;
        margin-bottom: 8px;
        padding: 6px 10px;
        background: var(--bg-card);
      }
      .wa-table tbody tr:last-child td { border-bottom: 1px solid var(--sep); }
      .wa-table td {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        padding: 6px 0;
        border-bottom: 1px solid var(--sep);
      }
      .wa-table td:last-child { border-bottom: 0; }
      .wa-table td::before {
        content: attr(data-label);
        color: var(--text-faint);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        flex-shrink: 0;
        font-weight: 600;
        padding-top: 1px;
      }
      .wa-actions { justify-content: flex-end; }
      .wa-msg { text-align: right; max-width: 65%; }
      .wa-resched-row td { display: block; }
      .wa-resched-row td::before { display: none; }
      .wa-resched { flex-direction: column; align-items: stretch; }
      .wa-resched-actions { margin-left: 0; }
      /* Tap targets — empareja la regla genérica al final del <style>. */
      .wa-btn, .wa-btn-link, .wa-chip-quick, .wa-tab { min-height: 36px; }
    }

  </style>
</head>
<body>
  <a href="#content" class="skip-link">Saltar al contenido</a>
  <div class="container">
    <header>
      <h1>rag <span>· dashboard</span></h1>
      <div class="header-meta">
        <span id="meta-period"></span>
        <span id="meta-updated"></span>
        <button class="live" id="live-toggle" data-state="off" type="button" aria-pressed="false" aria-label="Pausar o reanudar actualizaciones en vivo">
          <span class="dot" aria-hidden="true"></span><span id="live-label">conectando…</span>
        </button>
        <label for="days-picker" class="sr-only">Seleccionar período</label>
        <select id="days-picker" aria-label="Período">
          <option value="7">7 días</option>
          <option value="14">14 días</option>
          <option value="30" selected>30 días</option>
          <option value="90">90 días</option>
          <option value="365">1 año</option>
        </select>
        <button id="theme-toggle" class="live" type="button" aria-label="Alternar tema claro/oscuro">
          <span id="theme-icon" aria-hidden="true"></span>
        </button>
        <a href="/">home</a>
        <a href="/chat">chat</a>
        <a href="/dashboard/learning">learning</a>
        <a href="/transcripts">transcripts</a>
        <a href="/status">status</a>
        <a href="https://ra.ai/agents/">agents</a>
        <a href="http://localhost:8503" target="_blank" rel="noopener" title="sqlite-vec-gui (ragvec.db)">ragvec</a>
      </div>
    </header>

    <main id="content" tabindex="-1">
      <div class="skel-ticker skeleton" aria-hidden="true"></div>
      <div class="skel-kpis" aria-hidden="true">
        <div class="skel-kpi skeleton"></div>
        <div class="skel-kpi skeleton"></div>
        <div class="skel-kpi skeleton"></div>
        <div class="skel-kpi skeleton"></div>
        <div class="skel-kpi skeleton"></div>
        <div class="skel-kpi skeleton"></div>
      </div>
      <div class="skel-health" aria-hidden="true">
        <div class="skel-health-card skeleton"></div>
        <div class="skel-health-card skeleton"></div>
        <div class="skel-health-card skeleton"></div>
      </div>
      <div class="skel-charts" aria-hidden="true">
        <div class="skel-chart skeleton wide"></div>
        <div class="skel-chart skeleton wide"></div>
        <div class="skel-chart skeleton"></div>
        <div class="skel-chart skeleton"></div>
        <div class="skel-chart skeleton"></div>
        <div class="skel-chart skeleton"></div>
      </div>
    </main>
    <!-- Persistent SR-only live region. Lives OUTSIDE <main> on purpose:
         buildLayout() replaces #content.innerHTML on every theme/days
         change, which would clobber a status node nested inside. Keeping
         it here means JS can re-text it across rebuilds without losing
         the live-region wiring. -->
    <span id="dashboard-status" class="sr-only" role="status" aria-live="polite">Cargando datos del dashboard</span>
  </div>

  <script src="/static/dashboard.js" defer></script>
</body>
</html>
