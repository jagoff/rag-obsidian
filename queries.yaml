# Golden query set for evaluating the retriever.
# Each entry:
#   - question:  the user query as typed
#   - expected:  list of note paths (vault-relative) that SHOULD appear in top-k
#                — a query "hits" if ANY expected path is in top-k results
#   - note:      optional human comment on intent (not used by the evaluator)
#
# Add more queries over time. Keep them representative of real usage.

