<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#101214" />
  <title>prompts · obsidian-rag</title>
  <link rel="stylesheet" href="/static/prompts.css?v=20260518-6" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <h1>prompts</h1>
        <p id="root-label">rag/prompts</p>
      </div>
      <div class="top-actions">
        <span id="save-state" class="save-state">cargando</span>
        <button id="reload-btn" type="button">Recargar</button>
        <button id="save-btn" type="button" disabled>Guardar</button>
      </div>
    </header>

    <nav class="nav" aria-label="paginas">
      <a href="/">home</a>
      <a href="/chat">chat</a>
      <a href="/status">status</a>
      <a href="/logs">logs</a>
      <a href="/blacklist">blacklist</a>
    </nav>

    <main class="layout">
      <aside class="sidebar">
        <div class="filters">
          <input id="search" type="search" placeholder="filtrar por nombre, path o propósito" autocomplete="off" spellcheck="false" />
          <div class="segments" role="tablist" aria-label="tipo de prompt">
            <button class="segment is-active" type="button" data-filter="all">Todos</button>
            <button class="segment" type="button" data-filter="editable">Editables</button>
            <button class="segment" type="button" data-filter="inline">Inline</button>
          </div>
          <div class="importance-legend" aria-label="importancia visual">
            <span><i class="legend-color high"></i>rojo clave</span>
            <span><i class="legend-color medium"></i>amarillo medio</span>
            <span><i class="legend-color low"></i>azul bajo</span>
          </div>
          <div class="segments importance-segments" role="tablist" aria-label="importancia">
            <button class="segment" type="button" data-filter="high">Clave</button>
            <button class="segment" type="button" data-filter="medium">Medios</button>
            <button class="segment" type="button" data-filter="low">Bajos</button>
          </div>
        </div>
        <div id="prompt-list" class="prompt-list" aria-live="polite"></div>
      </aside>

      <section class="editor-pane">
        <div id="detail" class="detail empty">
          <h2>Seleccioná un prompt</h2>
          <p>—</p>
        </div>
        <textarea id="editor" spellcheck="false" disabled></textarea>
      </section>
    </main>
  </div>

  <script src="/static/admin-auth.js?v=20260518-1"></script>
  <script type="module" src="/static/prompts.js?v=20260518-3"></script>
</body>
</html>
