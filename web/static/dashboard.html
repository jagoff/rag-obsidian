<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rag · dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #1a1a1f;
      --bg-elev: #222228;
      --bg-card: #26262c;
      --border: #33333a;
      --border-strong: #3e3e46;
      --text: #ececed;
      --text-dim: #8a8a90;
      --text-faint: #5a5a60;
      --green: #7ee787;
      --cyan: #79c0ff;
      --cyan-dim: #3b7aa1;
      --yellow: #e3c27a;
      --red: #ff7b72;
      --purple: #d2a8ff;
      --orange: #ffa657;
      --pink: #f778ba;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: "SF Mono", "Menlo", "Monaco", "JetBrains Mono", ui-monospace, monospace;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* Header */
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--cyan);
    }

    header h1 span { color: var(--text-faint); font-weight: 400; }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .header-meta a {
      color: var(--cyan-dim);
      text-decoration: none;
    }
    .header-meta a:hover { color: var(--cyan); }

    select {
      background: var(--bg-elev);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 24px 4px 8px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%238a8a90' d='M0 0l5 6 5-6z'/></svg>");
      background-repeat: no-repeat;
      background-position: right 8px center;
    }

    /* KPI cards */
    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .kpi {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .kpi-label {
      font-size: 11px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }

    .kpi-sub {
      font-size: 11px;
      color: var(--text-dim);
    }

    .kpi-value.green { color: var(--green); }
    .kpi-value.cyan { color: var(--cyan); }
    .kpi-value.yellow { color: var(--yellow); }
    .kpi-value.red { color: var(--red); }
    .kpi-value.purple { color: var(--purple); }
    .kpi-value.orange { color: var(--orange); }

    /* Chart grid */
    .charts {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }

    .chart-card.wide {
      grid-column: 1 / -1;
    }

    .chart-card h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .chart-wrap {
      position: relative;
      width: 100%;
    }

    .chart-wrap canvas {
      width: 100% !important;
    }

    /* Stats table */
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .stats-table th {
      text-align: left;
      color: var(--text-faint);
      font-weight: 600;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
    }

    .stats-table td {
      padding: 5px 10px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
    }

    .stats-table td:last-child {
      text-align: right;
      font-weight: 600;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .stats-table tr:last-child td { border-bottom: none; }

    /* Health section */
    .health {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .health-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
    }

    .health-card h3 {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }

    .health-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
      font-size: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .health-row:last-child { border-bottom: none; }

    .health-label { color: var(--text-dim); }

    .health-value { font-weight: 700; font-variant-numeric: tabular-nums; }
    .health-value.good { color: var(--green); }
    .health-value.warn { color: var(--yellow); }
    .health-value.bad  { color: var(--red); }

    .health-bar {
      display: flex;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
      gap: 2px;
    }
    .health-bar > div { border-radius: 3px; }

    .health-verdict {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .health-verdict.ok  { background: rgba(126,231,135,0.08); color: var(--green); border: 1px solid rgba(126,231,135,0.15); }
    .health-verdict.mid { background: rgba(227,194,122,0.08); color: var(--yellow); border: 1px solid rgba(227,194,122,0.15); }
    .health-verdict.bad { background: rgba(255,123,114,0.08); color: var(--red); border: 1px solid rgba(255,123,114,0.15); }

    /* Tune history */
    .tune-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .tune-row:last-child { border-bottom: none; }
    .tune-date { color: var(--text-faint); width: 90px; }
    .tune-metric { color: var(--cyan); }
    .tune-delta { color: var(--green); }

    /* Live indicator */
    .live {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-faint);
      cursor: pointer;
      user-select: none;
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
    }
    .live:hover { border-color: var(--border-strong); }
    .live .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-faint);
      box-shadow: 0 0 0 0 rgba(126,231,135,0);
    }
    .live[data-state="live"] .dot {
      background: var(--green);
      animation: pulse 1.6s ease-out infinite;
    }
    .live[data-state="paused"] .dot { background: var(--yellow); }
    .live[data-state="off"] .dot { background: var(--red); }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(126,231,135,0.55); }
      70%  { box-shadow: 0 0 0 7px rgba(126,231,135,0); }
      100% { box-shadow: 0 0 0 0 rgba(126,231,135,0); }
    }

    /* Live ticker */
    .ticker {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .ticker-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .ticker-head h2 {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .ticker-empty { color: var(--text-faint); font-style: italic; padding: 8px 0; font-size: 12px; }
    .ticker-list { display: flex; flex-direction: column; gap: 4px; max-height: 180px; overflow-y: auto; }
    .ticker-item {
      display: grid;
      grid-template-columns: 60px 70px 1fr 60px 60px;
      gap: 10px;
      align-items: center;
      padding: 4px 6px;
      border-radius: 4px;
      font-size: 12px;
      animation: slideIn 0.4s ease-out;
    }
    .ticker-item:hover { background: rgba(255,255,255,0.025); }
    .ticker-item .t-time { color: var(--text-faint); font-variant-numeric: tabular-nums; font-size: 11px; }
    .ticker-item .t-source {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 600;
    }
    .ticker-item .t-source.whatsapp { background: rgba(126,231,135,0.12); color: var(--green); }
    .ticker-item .t-source.web { background: rgba(121,192,255,0.12); color: var(--cyan); }
    .ticker-item .t-source.cli { background: rgba(210,168,255,0.12); color: var(--purple); }
    .ticker-item .t-source.telegram { background: rgba(255,166,87,0.12); color: var(--orange); }
    .ticker-item .t-source.feedback { background: rgba(247,120,186,0.12); color: var(--pink); }
    .ticker-item .t-q { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ticker-item .t-score { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
    .ticker-item .t-score.high { color: var(--green); }
    .ticker-item .t-score.mid  { color: var(--yellow); }
    .ticker-item .t-score.low  { color: var(--red); }
    .ticker-item .t-latency { text-align: right; color: var(--text-dim); font-variant-numeric: tabular-nums; font-size: 11px; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Feedback section */
    .feedback-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .fb-list { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }
    .fb-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.02);
      border-radius: 6px;
      font-size: 12px;
      border-left: 2px solid var(--border-strong);
    }
    .fb-row.pos { border-left-color: var(--green); }
    .fb-row.neg { border-left-color: var(--red); }
    .fb-row.miss { border-left-color: var(--orange); }
    .fb-path { color: var(--cyan); font-size: 11px; word-break: break-all; }
    .fb-meta { color: var(--text-faint); font-size: 11px; margin-top: 2px; }
    .fb-q { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fb-count {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--red);
      align-self: center;
    }
    .fb-count.pos { color: var(--green); }
    .fb-empty {
      color: var(--text-faint);
      font-style: italic;
      text-align: center;
      padding: 30px 0;
      font-size: 12px;
    }
    .fb-cal {
      display: flex;
      gap: 16px;
      padding: 10px 0;
      margin-top: 10px;
      border-top: 1px solid var(--border);
    }
    .fb-cal-item { display: flex; flex-direction: column; gap: 2px; }
    .fb-cal-label { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.04em; }
    .fb-cal-value { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .fb-cal-value.bad { color: var(--red); }
    .fb-cal-value.warn { color: var(--yellow); }
    .fb-cal-value.good { color: var(--green); }

    @media (max-width: 900px) {
      .feedback-grid { grid-template-columns: 1fr; }
      .ticker-item { grid-template-columns: 50px 60px 1fr 50px; }
      .ticker-item .t-latency { display: none; }
    }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 120px 0;
      color: var(--text-dim);
      font-style: italic;
    }

    .loading::after {
      content: "▍";
      animation: blink 1s steps(2) infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* Responsive */
    @media (max-width: 900px) {
      .charts { grid-template-columns: 1fr; }
      .chart-card.wide { grid-column: 1; }
      .kpis { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>rag <span>· dashboard</span></h1>
      <div class="header-meta">
        <span id="meta-period"></span>
        <span id="meta-updated"></span>
        <button class="live" id="live-toggle" data-state="off" type="button" title="Click to pause/resume live updates">
          <span class="dot"></span><span id="live-label">conectando…</span>
        </button>
        <select id="days-picker" aria-label="Period">
          <option value="7">7 days</option>
          <option value="14">14 days</option>
          <option value="30" selected>30 days</option>
          <option value="90">90 days</option>
          <option value="365">1 year</option>
        </select>
        <a href="/">chat</a>
      </div>
    </header>

    <div id="content">
      <div class="loading">cargando datos </div>
    </div>
  </div>

  <script src="/static/dashboard.js"></script>
</body>
</html>
