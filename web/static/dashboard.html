<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rag · dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #1a1a1f;
      --bg-elev: #222228;
      --bg-card: #26262c;
      --border: #33333a;
      --border-strong: #3e3e46;
      --text: #ececed;
      --text-dim: #8a8a90;
      --text-faint: #5a5a60;
      --green: #7ee787;
      --cyan: #79c0ff;
      --cyan-dim: #3b7aa1;
      --yellow: #e3c27a;
      --red: #ff7b72;
      --purple: #d2a8ff;
      --orange: #ffa657;
      --pink: #f778ba;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: "SF Mono", "Menlo", "Monaco", "JetBrains Mono", ui-monospace, monospace;
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* Header */
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--cyan);
    }

    header h1 span { color: var(--text-faint); font-weight: 400; }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .header-meta a {
      color: var(--cyan-dim);
      text-decoration: none;
    }
    .header-meta a:hover { color: var(--cyan); }

    select {
      background: var(--bg-elev);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 24px 4px 8px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%238a8a90' d='M0 0l5 6 5-6z'/></svg>");
      background-repeat: no-repeat;
      background-position: right 8px center;
    }

    /* KPI cards */
    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .kpi {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .kpi-label {
      font-size: 11px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }

    .kpi-sub {
      font-size: 11px;
      color: var(--text-dim);
    }

    .kpi-value.green { color: var(--green); }
    .kpi-value.cyan { color: var(--cyan); }
    .kpi-value.yellow { color: var(--yellow); }
    .kpi-value.red { color: var(--red); }
    .kpi-value.purple { color: var(--purple); }
    .kpi-value.orange { color: var(--orange); }

    /* Chart grid */
    .charts {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }

    .chart-card.wide {
      grid-column: 1 / -1;
    }

    .chart-card h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .chart-wrap {
      position: relative;
      width: 100%;
    }

    .chart-wrap canvas {
      width: 100% !important;
    }

    /* Stats table */
    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .stats-table th {
      text-align: left;
      color: var(--text-faint);
      font-weight: 600;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
    }

    .stats-table td {
      padding: 5px 10px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
    }

    .stats-table td:last-child {
      text-align: right;
      font-weight: 600;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .stats-table tr:last-child td { border-bottom: none; }

    /* Health section */
    .health {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .health-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
    }

    .health-card h3 {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }

    .health-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
      font-size: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .health-row:last-child { border-bottom: none; }

    .health-label { color: var(--text-dim); }

    .health-value { font-weight: 700; font-variant-numeric: tabular-nums; }
    .health-value.good { color: var(--green); }
    .health-value.warn { color: var(--yellow); }
    .health-value.bad  { color: var(--red); }

    .health-bar {
      display: flex;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
      gap: 2px;
    }
    .health-bar > div { border-radius: 3px; }

    .health-verdict {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .health-verdict.ok  { background: rgba(126,231,135,0.08); color: var(--green); border: 1px solid rgba(126,231,135,0.15); }
    .health-verdict.mid { background: rgba(227,194,122,0.08); color: var(--yellow); border: 1px solid rgba(227,194,122,0.15); }
    .health-verdict.bad { background: rgba(255,123,114,0.08); color: var(--red); border: 1px solid rgba(255,123,114,0.15); }

    /* Tune history */
    .tune-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .tune-row:last-child { border-bottom: none; }
    .tune-date { color: var(--text-faint); width: 90px; }
    .tune-metric { color: var(--cyan); }
    .tune-delta { color: var(--green); }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 120px 0;
      color: var(--text-dim);
      font-style: italic;
    }

    .loading::after {
      content: "▍";
      animation: blink 1s steps(2) infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* Responsive */
    @media (max-width: 900px) {
      .charts { grid-template-columns: 1fr; }
      .chart-card.wide { grid-column: 1; }
      .kpis { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>rag <span>· dashboard</span></h1>
      <div class="header-meta">
        <span id="meta-period"></span>
        <select id="days-picker" aria-label="Period">
          <option value="7">7 days</option>
          <option value="14">14 days</option>
          <option value="30" selected>30 days</option>
          <option value="90">90 days</option>
          <option value="365">1 year</option>
        </select>
        <a href="/">chat</a>
      </div>
    </header>

    <div id="content">
      <div class="loading">cargando datos </div>
    </div>
  </div>

  <script src="/static/dashboard.js"></script>
</body>
</html>
